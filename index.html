<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"/>
<title>kill.me</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23C0392B'/%3E%3Cline x1='10' y1='11' x2='14' y2='15' stroke='%23fff' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='14' y1='11' x2='10' y2='15' stroke='%23fff' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='18' y1='11' x2='22' y2='15' stroke='%23fff' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='22' y1='11' x2='18' y2='15' stroke='%23fff' stroke-width='2.5' stroke-linecap='round'/%3E%3Cpath d='M11 21 Q16 18 21 21' stroke='%23fff' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#080808"/>
<link rel="apple-touch-icon" href="icons/icon-180.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080808; --bg2:#0D0D0D; --surface:#131313; --surface2:#191919; --surface3:#202020;
  --red:#C0392B; --red2:#D84E40;
  --warm:#B07830; --warm2:#C89040;
  --bone:#C4BDB2; --bone2:#8A8480;
  --border:#1C1C1C; --border2:#282828;
  --text:#DEDEDE; --text2:#A0A0A0;
  --muted:#3C3C3C; --muted2:#686868;
  --green:#2E7D52; --blue:#2A5FA8; --purple:#6A3EA8;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html{height:100%;background:var(--bg);}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:520px;margin:0 auto;font-size:clamp(14px,3.5vw,16px);touch-action:pan-x pan-y;}
button,a,input,label,select,textarea{touch-action:manipulation;}
.cinzel{font-family:'Playfair Display',Georgia,serif;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes floatSlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes icicleShimmer{0%,100%{opacity:.9}50%{opacity:.55}}
@keyframes lightningFlash{0%,80%,100%{opacity:0}88%{opacity:.95}94%{opacity:.3}}
@keyframes flameDance{0%,100%{transform:scaleX(1) translateY(0)}40%{transform:scaleX(.92) translateY(-3px)}70%{transform:scaleX(1.05) translateY(1px)}}
@keyframes iridShift{0%,100%{filter:drop-shadow(0 0 4px currentColor) hue-rotate(0deg)}50%{filter:drop-shadow(0 0 7px currentColor) hue-rotate(-22deg)}}
@keyframes garnetPulse{0%,100%{filter:drop-shadow(0 0 4px #9B1B30) brightness(1)}50%{filter:drop-shadow(0 0 10px #E8274B) brightness(1.3)}}
@keyframes diamondShimmer{0%,100%{filter:drop-shadow(0 0 3px #89CFF0) brightness(1)}50%{filter:drop-shadow(0 0 8px #B0E0FF) brightness(1.4) hue-rotate(20deg)}}
.logro-t1{color:#CD7F32;}
.logro-t2{color:#A8A9AD;}
.logro-t3{color:#FFD700;filter:drop-shadow(0 0 3px rgba(255,215,0,.4));}
.logro-t4{color:#89CFF0;animation:diamondShimmer 2.5s ease-in-out infinite;}
.logro-t5{color:#C0392B;animation:garnetPulse 2s ease-in-out infinite;}
.logro-special{color:#FFD700;animation:iridShift 2.5s ease-in-out infinite;}
.logro-badge{position:relative;cursor:default;}
.logro-badge::after{content:attr(data-desc);position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:clamp(10px,2.5vw,11px);padding:6px 9px;border-radius:7px;white-space:normal;width:max-content;max-width:180px;text-align:center;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;line-height:1.4;box-shadow:0 3px 10px rgba(0,0,0,.4);}
.logro-badge::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--border2);pointer-events:none;opacity:0;transition:opacity .15s;z-index:201;}
@media(hover:hover){.logro-badge:hover::after,.logro-badge:hover::before{opacity:1;}}
.logro-badge.tip-open::after,.logro-badge.tip-open::before{opacity:1;}
@keyframes flicker{0%,100%{opacity:.9;transform:scaleY(1)}45%{opacity:1;transform:scaleY(1.1) scaleX(.95)}70%{opacity:.85;transform:scaleY(.95)}}
@keyframes shockPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5) saturate(1.3)}}
@keyframes glow{0%,100%{opacity:.18}50%{opacity:.32}}
/* Loading */
.pg-load{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.pg-load .brand{font-family:'Playfair Display',serif;font-size:clamp(20px,6vw,28px);font-weight:900;letter-spacing:4px;color:var(--text);opacity:0;animation:fadeUp .4s .15s forwards;}
.pg-load .brand em{color:var(--red);font-style:normal;}
.spin{width:20px;height:20px;border:1.5px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
/* Auth */
.auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(20px,5vw,40px) clamp(16px,4vw,24px);animation:fadeUp .3s ease;}
.auth-brand{text-align:center;margin-bottom:24px;}
.auth-brand h1{font-family:'Playfair Display',serif;font-size:clamp(32px,8vw,44px);font-weight:900;letter-spacing:2px;color:var(--text);line-height:1;}
.auth-brand h1 em{color:var(--red);font-style:normal;}
.auth-brand p{color:var(--muted2);font-size:clamp(11px,2.5vw,13px);margin-top:10px;}
.auth-doll-preview{display:flex;justify-content:center;margin-bottom:20px;}
.auth-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:clamp(18px,4.5vw,26px);}
.auth-tabs{display:flex;background:var(--bg2);border-radius:7px;overflow:hidden;border:1px solid var(--border);margin-bottom:16px;}
.auth-tab{flex:1;padding:10px;background:transparent;border:none;color:var(--muted2);font-weight:600;font-size:clamp(12px,3vw,13px);cursor:pointer;transition:all .18s;}
.auth-tab.on{background:var(--surface2);color:var(--text);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:clamp(9px,2vw,10px);color:var(--muted2);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;}
.field input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:clamp(10px,2.5vw,12px) 12px;font-size:clamp(14px,3.5vw,15px);font-family:inherit;transition:border-color .16s;outline:none;-webkit-appearance:none;}
.field input:focus{border-color:var(--red);}
.pass-reqs{margin-top:7px;display:flex;flex-wrap:wrap;gap:5px;}
.req{font-size:clamp(9px,2.2vw,10px);padding:3px 7px;border-radius:4px;background:var(--surface2);color:var(--muted2);transition:all .2s;}
.req.ok{background:rgba(46,125,82,.15);color:#4CAF82;}
.pass-warning{font-size:clamp(10px,2.5vw,11px);color:var(--text2);margin-top:8px;line-height:1.5;padding:7px 10px;background:rgba(192,57,43,.07);border-radius:6px;border-left:2px solid var(--red);}
.pass-warning strong{color:var(--red);}
.auth-err{color:#E05040;font-size:clamp(11px,2.5vw,12px);min-height:16px;margin-bottom:8px;text-align:center;}
.step-label{font-size:clamp(10px,2.5vw,11px);color:var(--muted2);text-align:center;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;}
.onb-colors{display:flex;justify-content:center;gap:clamp(10px,3vw,14px);flex-wrap:wrap;margin:16px 0;}
.onb-circle{width:clamp(36px,9vw,42px);height:clamp(36px,9vw,42px);border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;transition:all .16s;}
.onb-circle.on{border-color:var(--text);transform:scale(1.15);}
/* Verify email screen */
.verify-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:18px;animation:fadeUp .3s ease;}
.verify-icon{width:64px;height:64px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;}
.verify-title{font-family:'Playfair Display',serif;font-size:clamp(18px,5vw,22px);font-weight:700;color:var(--text);text-align:center;}
.verify-sub{color:var(--muted2);font-size:clamp(12px,3vw,14px);text-align:center;line-height:1.6;max-width:320px;}
.verify-sub strong{color:var(--text2);}
/* Buttons */
.btn{width:100%;border:none;border-radius:9px;padding:clamp(12px,3vw,14px);font-weight:700;font-size:clamp(13px,3.5vw,14px);cursor:pointer;letter-spacing:.3px;transition:all .15s;font-family:inherit;}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover{background:var(--red2);}
.btn-red:disabled{background:var(--muted);cursor:default;color:var(--muted2);}
.btn-warm{background:var(--warm);color:#120a02;font-weight:800;}
.btn-warm:hover{background:var(--warm2);}
.btn-warm-sm{display:inline-block;background:var(--warm);color:#120a02;border:none;border-radius:7px;padding:clamp(9px,2.5vw,11px) clamp(18px,5vw,26px);font-weight:700;font-size:clamp(12px,3vw,13px);cursor:pointer;letter-spacing:.3px;transition:background .15s;}
.btn-warm-sm:hover{background:var(--warm2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted2);border-radius:9px;padding:clamp(11px,2.5vw,13px);font-weight:600;font-size:clamp(12px,3vw,13px);cursor:pointer;width:100%;transition:all .16s;font-family:inherit;}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}
.btn-link{background:none;border:none;color:var(--muted2);font-size:clamp(12px,3vw,13px);cursor:pointer;text-align:center;width:100%;padding:11px;display:block;transition:color .16s;font-family:inherit;}
.btn-link:hover{color:var(--text2);}
/* Layout */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:max(env(safe-area-inset-top),16px) clamp(14px,4vw,20px) 0;}
.logo{font-family:'Playfair Display',serif;font-weight:900;letter-spacing:3px;font-size:clamp(13px,3.5vw,16px);color:var(--text);}
.logo em{color:var(--red);font-style:normal;}
.topbar-r{display:flex;align-items:center;gap:10px;}
.streak-pill{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:3px 9px;font-size:clamp(10px,2.5vw,11px);font-weight:700;color:var(--warm);display:flex;align-items:center;gap:4px;}
.gear-btn{background:none;border:none;cursor:pointer;color:var(--muted2);display:flex;align-items:center;padding:4px;transition:color .16s;}
.gear-btn:hover{color:var(--text);}
.screen{padding:clamp(14px,3.5vw,20px);padding-bottom:clamp(88px,20vw,100px);animation:fadeUp .22s ease;}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:rgba(8,8,8,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:clamp(10px,3vw,14px) 0 max(calc(10px + env(safe-area-inset-bottom)),12px);}
.navbtn{flex:1;background:none;border:none;color:var(--muted2);font-weight:600;font-size:clamp(9px,2.5vw,10px);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .16s;letter-spacing:.4px;}
.navbtn-ico{height:24px;display:flex;align-items:center;justify-content:center;}
.navbtn.on{color:var(--red);}
.navbtn svg{transition:transform .16s;}
.navbtn.on svg{transform:scale(1.1);}
/* Page title */
.ptitle{font-family:'Playfair Display',serif;color:var(--text);font-size:clamp(16px,4.2vw,20px);font-weight:700;text-align:center;letter-spacing:.3px;line-height:1.3;}
.psub{color:var(--muted2);font-size:clamp(11px,2.8vw,13px);text-align:center;margin-top:5px;line-height:1.5;}
.rule{width:24px;height:1px;background:var(--border2);margin:12px auto;}
.doll-wrap{position:relative;display:inline-flex;justify-content:center;border-radius:12px;}
/* Death grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:clamp(7px,2vw,10px);margin-top:14px;}
.dcell{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:clamp(10px,2.5vw,14px) 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .16s;overflow:hidden;position:relative;}
.dcell.on{border-color:var(--warm);}
.dcell.on:hover{background:var(--surface2);}
.dcell.off{opacity:.28;cursor:default;}
.dcell.deps-lock{opacity:.45;cursor:default;border-color:var(--blue);}
.dcell .dlabel{color:var(--text);font-size:clamp(11px,3vw,12px);font-weight:600;text-align:center;line-height:1.2;}
.dcell .dreq{font-size:clamp(8px,2.2vw,9px);font-weight:600;text-align:center;letter-spacing:.3px;padding:2px 6px;border-radius:4px;}
.dreq-streak{color:var(--warm);background:rgba(176,120,48,.12);}
.dreq-deps{color:#5A8FD4;background:rgba(42,95,168,.12);}
.draw-cell{grid-column:span 2;background:var(--surface);border:1px dashed var(--border2);border-radius:10px;padding:clamp(12px,3vw,16px);display:flex;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:background .16s;}
.draw-cell:hover{background:var(--surface2);}
.draw-cell .dlabel{color:var(--text);font-size:clamp(13px,3.5vw,14px);font-weight:600;}
.draw-cell .dsub{color:var(--muted2);font-size:clamp(10px,2.5vw,11px);margin-top:2px;}
.unlock-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--blue);border-radius:0 0 10px 10px;transition:width .3s;}
/* Deaths collection */
.deaths-header-stats{display:flex;gap:10px;margin-top:4px;margin-bottom:18px;}
.dhs-pill{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center;}
.dhs-num{font-family:'Playfair Display',serif;font-size:clamp(18px,4.5vw,24px);font-weight:900;line-height:1;}
.dhs-lbl{color:var(--muted2);font-size:clamp(8px,2vw,9px);text-transform:uppercase;letter-spacing:.7px;margin-top:3px;}
.deaths-section{margin-top:18px;}
.deaths-section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.deaths-section-hdr span{font-size:clamp(9px,2.2vw,10px);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted2);}
.deaths-section-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.death-row{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:clamp(10px,2.5vw,13px) clamp(10px,3vw,14px);display:flex;align-items:center;gap:12px;margin-bottom:7px;position:relative;overflow:hidden;transition:border-color .15s;}
.death-row.dr-unlocked{border-color:var(--border2);}
.death-row.dr-next-streak{border-color:rgba(176,120,48,.4);}
.death-row.dr-next-deps{border-color:rgba(42,95,168,.4);}
.death-row.dr-locked{opacity:.35;}
.dr-doll{flex-shrink:0;width:clamp(56px,15vw,72px);display:flex;align-items:center;justify-content:center;}
.dr-lock{flex-shrink:0;width:clamp(56px,15vw,72px);display:flex;align-items:center;justify-content:center;color:var(--muted);}
.dr-info{flex:1;min-width:0;}
.dr-name{color:var(--text);font-weight:600;font-size:clamp(13px,3.5vw,14px);}
.dr-status{font-size:clamp(10px,2.5vw,11px);margin-top:3px;}
.dr-status.ok{color:#4CAF82;}
.dr-status.streak{color:var(--warm);}
.dr-status.deps{color:#5A8FD4;}
.dr-status.far{color:var(--muted2);}
.dr-bar-wrap{height:3px;background:var(--border2);border-radius:2px;margin-top:6px;overflow:hidden;}
.dr-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
.dr-bar-fill.streak{background:var(--warm);}
.dr-bar-fill.deps{background:#5A8FD4;}
.dr-prog{flex-shrink:0;text-align:right;}
.dr-prog-num{font-family:'Playfair Display',serif;font-size:clamp(13px,3.5vw,15px);font-weight:700;color:var(--muted2);line-height:1;}
.dr-prog-lbl{font-size:clamp(8px,2vw,9px);color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
/* Feed */
.feed-list{margin-top:8px;}
.feed-card{border-bottom:1px solid var(--border);padding:clamp(14px,3.5vw,18px) 0;animation:fadeUp .2s ease;}
.feed-card:last-child{border-bottom:none;}
.feed-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.avatar{width:clamp(26px,6.5vw,32px);height:clamp(26px,6.5vw,32px);border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;}
.feed-meta{flex:1;min-width:0;}
.feed-name{color:var(--text);font-weight:600;font-size:clamp(13px,3.5vw,14px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.feed-time{color:var(--muted2);font-size:clamp(10px,2.5vw,11px);}
.friend-tag{border:1px solid var(--border2);border-radius:4px;padding:2px 6px;font-size:clamp(9px,2vw,10px);font-weight:700;color:var(--warm);letter-spacing:.5px;white-space:nowrap;}
.feed-razon{color:var(--text2);font-size:clamp(13px,3.5vw,14px);margin:2px 0 8px;line-height:1.58;}
.feed-castigo{display:inline-block;font-size:clamp(10px,2.5vw,11px);font-weight:700;color:var(--warm);margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase;}
.dep-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid transparent;border-radius:20px;padding:3px 8px;cursor:pointer;font-size:clamp(11px,2.8vw,12px);color:var(--muted2);transition:all .16s;font-family:inherit;}
.dep-btn.given{color:var(--red);border-color:rgba(192,57,43,.32);}
.dep-btn:not(.given):hover{background:rgba(192,57,43,.05);border-color:rgba(192,57,43,.2);color:var(--text2);}
.dep-count{color:var(--warm);font-weight:800;}
.follow-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;color:var(--muted2);font-size:clamp(10px,2.5vw,11px);font-weight:600;cursor:pointer;transition:all .16s;white-space:nowrap;flex-shrink:0;font-family:inherit;}
.follow-btn.following{background:var(--surface2);border-color:var(--border2);color:var(--warm);}
.own-dep{text-align:center;color:var(--muted2);font-size:clamp(11px,3vw,12px);padding:7px;display:flex;align-items:center;justify-content:center;gap:5px;}
/* Canvas */
canvas{background:var(--surface2);border-radius:10px;border:1px solid var(--border2);touch-action:none;display:block;margin:0 auto;max-width:100%;}
.swatches{display:flex;justify-content:center;gap:clamp(8px,2vw,11px);margin-top:12px;flex-wrap:wrap;}
.swatch{width:clamp(20px,5vw,25px);height:clamp(20px,5vw,25px);border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;transition:transform .13s;}
.swatch.on{border-color:var(--text);transform:scale(1.2);}
.wrow{display:flex;justify-content:center;gap:9px;margin-top:10px;align-items:center;}
.wbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;}
.wbtn.on{border-color:var(--warm);background:var(--surface2);}
.wdot{border-radius:50%;background:var(--text);}
.clearbtn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted2);font-size:clamp(10px,2.5vw,11px);padding:5px 10px;cursor:pointer;transition:all .16s;font-family:inherit;}
.clearbtn:hover{border-color:var(--muted);}
/* Settings */
.colorpick{display:flex;justify-content:center;gap:clamp(10px,3vw,14px);flex-wrap:wrap;margin-top:18px;}
.ccircle{width:clamp(32px,8vw,40px);height:clamp(32px,8vw,40px);border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;transition:all .16s;}

const MERCURY_RX=[['2023-12-13','2024-01-01'],['2024-04-01','2024-04-25'],['2024-08-05','2024-08-28'],['2024-11-26','2024-12-15'],['2025-03-15','2025-04-07'],['2025-07-18','2025-08-11'],['2025-11-09','2025-11-29'],['2026-03-03','2026-03-25'],['2026-06-29','2026-07-22'],['2026-10-16','2026-11-08']];
function inMercuryRx(dateStr){return MERCURY_RX.some(([s,e])=>dateStr>=s&&dateStr<=e);}
function getZodiacSign(bdate){const m=bdate.getMonth()+1,d=bdate.getDate();if((m===3&&d>=21)||(m===4&&d<=19))return'aries';if((m===4&&d>=20)||(m===5&&d<=20))return'tauro';if((m===5&&d>=21)||(m===6&&d<=20))return'géminis';if((m===6&&d>=21)||(m===7&&d<=22))return'cáncer';if((m===7&&d>=23)||(m===8&&d<=22))return'leo';if((m===8&&d>=23)||(m===9&&d<=22))return'virgo';if((m===9&&d>=23)||(m===10&&d<=22))return'libra';if((m===10&&d>=23)||(m===11&&d<=21))return'escorpio';if((m===11&&d>=22)||(m===12&&d<=21))return'sagitario';if((m===12&&d>=22)||(m===1&&d<=19))return'capricornio';if((m===1&&d>=20)||(m===2&&d<=18))return'acuario';return'piscis';}

}

  return svg.replace(/width="\d+"/, `width="${nw}"`).replace(/height="\d+"/, `height="${targetH}"`);
}

// ── Poses ──────────────────────────────────────────────
// Body is now a filled rect; returns {bHW,bT,bB,bRx,aL,aR,lL,lR}
function getPose(name,w,h){
  const cx=w/2;
  const hr=Math.round(h*.30);   // head radius: 84px (h=280)
  const hcy=Math.round(h*.35);  // head center y: 98px
  const bHW=Math.round(w*.148); // body half-width: 33px
  const bT=hcy+hr-8;             // body top overlaps head base slightly
  const bB=bT+Math.round(h*.18); // body taller
  const aY=Math.round(bT+(bB-bT)*.42); // arm y
  const lW=Math.round(w*.062);  // leg half-width at bottom: 14px
  const D={bHW,bT,bB,bRx:9,
    aL:`M${cx-bHW} ${aY} Q${w*.15} ${aY+18} ${w*.06} ${aY+38}`,
    aR:`M${cx+bHW} ${aY} Q${w*.85} ${aY+18} ${w*.94} ${aY+38}`,
    lL:`M${cx-lW} ${bB} Q${cx-lW-2} ${h*.88} ${cx-lW-5} ${h*.97}`,
    lR:`M${cx+lW} ${bB} Q${cx+lW+2} ${h*.88} ${cx+lW+5} ${h*.97}`,
  };
  // Arms always start from BODY SIDES; head is drawn on top so upward arms hide naturally behind head
  // Arms always route WIDE to the sides so they never overlap the big head circle
  if(name==='scared') return{...D,
    aL:`M${cx-bHW} ${aY} Q${w*.04} ${aY+10} ${w*.02} ${hcy+hr*.55}`,
    aR:`M${cx+bHW} ${aY} Q${w*.96} ${aY+10} ${w*.98} ${hcy+hr*.55}`,
  };
  if(name==='cowering') return{...D,
    aL:`M${cx-bHW} ${aY} Q${w*.05} ${aY-28} ${w*.04} ${hcy+hr*.35}`,
    aR:`M${cx+bHW} ${aY} Q${w*.95} ${aY-28} ${w*.96} ${hcy+hr*.35}`,
  };
  if(name==='begging') return{...D,
    aL:`M${cx-bHW} ${aY} Q${w*.14} ${aY+14} ${w*.04} ${aY+20}`,
    aR:`M${cx+bHW} ${aY} Q${w*.86} ${aY+14} ${w*.96} ${aY+20}`,
  };
  if(name==='dramatic') return{...D,
    aL:`M${cx-bHW} ${aY} Q${w*.03} ${aY+10} ${w*.02} ${hcy+hr*.5}`,
    aR:`M${cx+bHW} ${aY} Q${w*.97} ${aY-40} ${w*.98} ${hcy-hr*.15}`,
  };
  const sbHW=Math.round(bHW*1.28),sbB=Math.round(bT+(bB-bT)*.62),saY=Math.round(bT+(sbB-bT)*.42);
  if(name==='squish') return{bHW:sbHW,bT,bB:sbB,bRx:9,
    aL:`M${cx-sbHW} ${saY} Q${w*.14} ${saY+2} ${w*.03} ${saY+4}`,
    aR:`M${cx+sbHW} ${saY} Q${w*.86} ${saY+2} ${w*.97} ${saY+4}`,
    lL:`M${cx-lW} ${sbB} Q${cx-lW-2} ${h*.79} ${cx-lW-5} ${h*.90}`,
    lR:`M${cx+lW} ${sbB} Q${cx+lW+2} ${h*.79} ${cx+lW+5} ${h*.90}`,
  };
  if(name==='ghost') return{...D,
    aL:`M${cx-bHW} ${aY} Q${w*.03} ${aY} ${w*.02} ${hcy+hr*.65}`,
    aR:`M${cx+bHW} ${aY} Q${w*.97} ${aY} ${w*.98} ${hcy+hr*.65}`,
  };
  return D;
}

// ── Doll SVG – core draw ────────────────────────────────
// draw order: fx → shadow → legs → body rect → arms → head → mechón → face
// head drawn LAST so upward arms hide naturally behind it
function _dollCore(color,dead,poseName,w,h,sw,extraFx){
  const pose=getPose(poseName||'idle',w,h);
  const dark=color==="#C0B898"||color==="#D0C8B8"||color==="#E8E8E8";
  const ec=dark?"#2A1E38":"#080808";
  const ec2=dark?"rgba(0,0,0,.5)":"rgba(255,255,255,.6)";
  const hr=Math.round(h*.30),hcy=Math.round(h*.35),cx=w/2;
  // Eyes — wider apart, bigger radius
  const lx=cx-hr*.28,rx=cx+hr*.28,ey=hcy-hr*.21;
  const er=Math.max(5,hr*.115);
  const sw_f=Math.max(4.5,hr*.072); // face stroke (mouth/XX)
  const face=dead?`
    <line x1="${lx-hr*.13}" y1="${ey-hr*.11}" x2="${lx+hr*.13}" y2="${ey+hr*.11}" stroke="${ec}" stroke-width="${sw_f}" stroke-linecap="round"/>
    <line x1="${lx+hr*.13}" y1="${ey-hr*.11}" x2="${lx-hr*.13}" y2="${ey+hr*.11}" stroke="${ec}" stroke-width="${sw_f}" stroke-linecap="round"/>
    <line x1="${rx-hr*.13}" y1="${ey-hr*.11}" x2="${rx+hr*.13}" y2="${ey+hr*.11}" stroke="${ec}" stroke-width="${sw_f}" stroke-linecap="round"/>
    <line x1="${rx+hr*.13}" y1="${ey-hr*.11}" x2="${rx-hr*.13}" y2="${ey+hr*.11}" stroke="${ec}" stroke-width="${sw_f}" stroke-linecap="round"/>
    <path d="M${cx-hr*.22} ${hcy+hr*.22} Q${cx} ${hcy+hr*.13} ${cx+hr*.22} ${hcy+hr*.22}" stroke="${ec}" stroke-width="${sw_f}" fill="none" stroke-linecap="round"/>
  `:`
    <circle cx="${lx}" cy="${ey}" r="${er}" fill="${ec}"/>
    <circle cx="${rx}" cy="${ey}" r="${er}" fill="${ec}"/>
    <path d="M${cx-hr*.13} ${hcy+hr*.20} Q${cx} ${hcy+hr*.28} ${cx+hr*.13} ${hcy+hr*.20}" stroke="${ec}" stroke-width="${sw_f}" fill="none" stroke-linecap="round"/>
  `;
  // Mechón — filled closed arch at upper-left of head, curves above head top
  const mech=`<path d="M${cx-hr*.36} ${hcy-hr*.78} C${cx-hr*.58} ${hcy-hr*.80} ${cx-hr*.60} ${hcy-hr*1.08} ${cx-hr*.26} ${hcy-hr*1.10} C${cx-hr*.08} ${hcy-hr*1.10} ${cx-hr*.06} ${hcy-hr*.84} ${cx-hr*.20} ${hcy-hr*.78} Z" fill="${color}"/>`;
  const shd=`<circle cx="${cx+hr*.10}" cy="${hcy+hr*.14}" r="${hr}" fill="rgba(0,0,0,.18)"/>`;
  return `${shd}
    <g stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="${pose.lL}"/><path d="${pose.lR}"/>
    </g>
    <rect x="${cx-pose.bHW}" y="${pose.bT}" width="${pose.bHW*2}" height="${pose.bB-pose.bT}" rx="${pose.bRx}" fill="${color}"/>
    <g stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="${pose.aL}"/><path d="${pose.aR}"/>
    </g>
    <circle cx="${cx}" cy="${hcy}" r="${hr}" fill="${color}" stroke="none"/>
    ${mech}
    ${face}
    ${extraFx||''}`;
}

// ── Doll SVG ──────────────────────────────────────────
function dollSVG(color,death,dead,poseName,px){
  const w=220,h=280,sw=22;
  px=px||110;
  let fx="";

    fx=`<ellipse cx="${w*.5}" cy="${h}" rx="${w*.54}" ry="${h*.09}" fill="#0B0303" opacity=".96"/>`;
    // outer-left

function dollWithDraw(color,death,strokes,dead,poseName,px){
  if(death!=="dibujo")return dollSVG(color,death,dead,poseName,px);
  px=px||110;
  const ht=Math.round(px*280/220);
  const polys=(strokes||[]).map(s=>`<polyline points="${s.puntos.map(p=>`${p.x},${p.y}`).join(" ")}" stroke="${s.color}" stroke-width="${s.grosor}" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`).join("");
  return `<div class="doll-wrap" style="width:${px}px;height:${ht}px;position:relative;">
    ${dollSVG(color,null,dead,'idle',px)}
    <svg viewBox="0 0 220 280" width="${px}" height="${ht}" style="position:absolute;top:0;left:0;">${polys}</svg>
  </div>`;
}

// ── Session (never hangs) ──────────────────────────────
async function safeGetSession(){
  return new Promise(resolve=>{
    let done=false;
    const timer=setTimeout(()=>{
      if(done)return;done=true;
      Object.keys(localStorage).filter(k=>k.includes('supabase')||k.includes('sb-')).forEach(k=>localStorage.removeItem(k));
      console.warn('getSession timeout — cleared stale auth');
      resolve({data:{session:null}});
    },5000);
    sb.auth.getSession().then(res=>{
      if(done)return;done=true;
      clearTimeout(timer);resolve(res);
    }).catch(()=>{
      if(done)return;done=true;
      clearTimeout(timer);
      Object.keys(localStorage).filter(k=>k.includes('supabase')||k.includes('sb-')).forEach(k=>localStorage.removeItem(k));
      resolve({data:{session:null}});
    });
  });
}

async function loadProfile(){
  const timeout=new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),7000));
  const query=sb.from('profiles').select('*').eq('id',user.id).maybeSingle().then(r=>r);
  const {data}=await Promise.race([query,timeout]);
  profile=data;
  try{
    const {data:posts}=await sb.from('posts').select('dep_count').eq('user_id',user.id);
    totalDeps=(posts||[]).reduce((s,p)=>s+(p.dep_count||0),0);
  }catch(e){totalDeps=0;}
  if(profile&&user.email&&!profile.email){
    try{await sb.from('profiles').update({email:user.email}).eq('id',user.id);}catch(e){}
    profile.email=user.email;
  }
  if(profile&&!profile.birth_date){
    const cached=localStorage.getItem('killme_birth_'+user.id);
    if(cached)profile.birth_date=cached;
  }
}
async function loadTodayPost(){

async function loadFollows(){
  try{
    const {data}=await sb.from('follows').select('following_id').eq('follower_id',user.id);
    myFollowing=new Set((data||[]).map(f=>f.following_id));

async function loadFriendRequests(){
  try{
    const [{data:recv},{data:sent},{data:accepted}]=await Promise.all([
      sb.from('friend_requests').select('*').eq('receiver_id',user.id).eq('status','pending'),
      sb.from('friend_requests').select('receiver_id').eq('sender_id',user.id).eq('status','pending'),
      sb.from('friend_requests').select('sender_id,receiver_id').or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`).eq('status','accepted'),
    ]);
    // Load sender profiles separately to avoid FK name dependency
    const senderIds=(recv||[]).map(r=>r.sender_id).filter(Boolean);
    let senderProfiles=[];
    if(senderIds.length){
      const {data:sp}=await sb.from('profiles').select('id,username,doll_color').in('id',senderIds);
      senderProfiles=sp||[];
    }
    pendingFriendReqs=(recv||[]).map(r=>({...r,sender:senderProfiles.find(p=>p.id===r.sender_id)||null}));
    sentFriendReqs=new Set((sent||[]).map(r=>r.receiver_id));
    myFriends=new Set((accepted||[]).map(r=>r.sender_id===user.id?r.receiver_id:r.sender_id));
    señalesBadge=pendingFriendReqs.length>0;
  }catch(e){console.error('loadFriendRequests',e);pendingFriendReqs=[];sentFriendReqs=new Set();myFriends=new Set();}
}
async function sendFriendRequest(uid){
  try{
    await sb.from('friend_requests').insert({sender_id:user.id,receiver_id:uid});
    sentFriendReqs.add(uid);
    if(!myFollowing.has(uid)){
      await sb.from('follows').insert({follower_id:user.id,following_id:uid}).catch(()=>{});
      myFollowing.add(uid);
    }
    paint();
  }catch(e){alert('Error al enviar solicitud: '+e.message);}
}
async function acceptFriendRequest(reqId,senderId){
  try{
    await sb.from('friend_requests').update({status:'accepted'}).eq('id',reqId);
    pendingFriendReqs=pendingFriendReqs.filter(r=>r.id!==reqId);
    myFriends.add(senderId);
    señalesBadge=pendingFriendReqs.length>0;
    if(!myFollowing.has(senderId)){
      await sb.from('follows').insert({follower_id:user.id,following_id:senderId}).catch(()=>{});
      myFollowing.add(senderId);
    }
    paint();
  }catch(e){alert('Error: '+e.message);}
}
async function rejectFriendRequest(reqId){
  try{
    await sb.from('friend_requests').update({status:'rejected'}).eq('id',reqId);
    pendingFriendReqs=pendingFriendReqs.filter(r=>r.id!==reqId);
    señalesBadge=pendingFriendReqs.length>0;
    paint();
  }catch(e){alert('Error: '+e.message);}
}
async function cancelFriendRequest(uid){
  try{
    await sb.from('friend_requests').delete().eq('sender_id',user.id).eq('receiver_id',uid).eq('status','pending');
    sentFriendReqs.delete(uid);
    paint();
  }catch(e){alert('Error: '+e.message);}
}
async function removeFriend(uid){
  try{
    await sb.from('friend_requests').delete().or(`and(sender_id.eq.${user.id},receiver_id.eq.${uid}),and(sender_id.eq.${uid},receiver_id.eq.${user.id})`);
    myFriends.delete(uid);sentFriendReqs.delete(uid);paint();
  }catch(e){alert('Error: '+e.message);}
}

function dollPureSVG(color,death,strokes,dead,poseName,svgW,svgH){
  const w=svgW||220,h=svgH||280;
  const tmp=dollSVG(color,death,dead,poseName,w);
  const match=tmp.match(/<svg[^>]*>([\s\S]*?)<\/svg>/);
  const inner=match?match[1]:'';
  const drawLayer=strokes&&death==='dibujo'?strokes.map(s=>`<polyline points="${s.puntos.map(pt=>`${pt.x},${pt.y}`).join(' ')}" stroke="${s.color}" stroke-width="${s.grosor}" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`).join(''):'';
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${inner}${drawLayer}</svg>`;
}

async function _buildShareBlob(p,format){
  const d=DEATHS.find(x=>x.id===p.castigo);
  const lbl=p.castigo==='dibujo'?(p.dibujo_descripcion||'Dibujo'):dl(p.castigo);
  const W=1080,H=format==='story'?1920:1350,DOLL_PX=format==='story'?480:400;
  const dollY=format==='story'?280:190;
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#0A0A0A';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#C0392B';ctx.fillRect(0,0,W,12);
  ctx.strokeStyle='rgba(192,57,43,.12)';ctx.lineWidth=3;ctx.strokeRect(24,24,W-48,H-48);
  ctx.textAlign='left';
  ctx.font='900 80px Georgia,"Times New Roman",serif';
  const killW=ctx.measureText('kill').width;
  const meW=ctx.measureText('.me').width;
  const brandX=(W-killW-meW)/2;
  ctx.fillStyle='#DEDEDE';ctx.fillText('kill',brandX,118);
  ctx.fillStyle='#C0392B';ctx.fillText('.me',brandX+killW,118);
  ctx.strokeStyle='rgba(192,57,43,.22)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(180,160);ctx.lineTo(W-180,160);ctx.stroke();
  try{
    const svgW=220,svgH=280,scale=DOLL_PX/svgW;
    const svgStr=dollPureSVG(p.doll_color,p.castigo,p.dibujo_trazos,true,d?.pose||'idle',svgW,svgH);
    const svgBlob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
    const svgUrl=URL.createObjectURL(svgBlob);
    await new Promise(res=>{
      const img=new Image();
      img.onload=()=>{const dh=Math.round(svgH*scale);ctx.drawImage(img,W/2-DOLL_PX/2,dollY,DOLL_PX,dh);URL.revokeObjectURL(svgUrl);res();};
      img.onerror=()=>{URL.revokeObjectURL(svgUrl);res();};
      img.src=svgUrl;
    });
  }catch(e){}
  const textY=format==='story'?1200:730;
  ctx.textAlign='center';
  const intro=lang==='en'?'The reason I can\'t today:':'La razón por la que no puedo más hoy:';
  ctx.fillStyle='rgba(150,135,120,.65)';ctx.font='italic 32px Georgia,serif';
  ctx.fillText(intro,W/2,textY);
  ctx.fillStyle='#B0A898';ctx.font='italic 50px Georgia,serif';
  const maxW=W-160,lineH=72;
  const words=(`"${p.razon}"`).split(' ');
  let line='',y=textY+80;
  for(const word of words){
    const test=line+word+' ';
    if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line.trim(),W/2,y);line=word+' ';y+=lineH;}
    else line=test;
  }
  ctx.fillText(line.trim(),W/2,y);
  y+=100;
  ctx.fillStyle='#B07830';ctx.font='700 40px system-ui,sans-serif';ctx.letterSpacing='3px';
  ctx.fillText(lbl.toUpperCase(),W/2,y);ctx.letterSpacing='0px';
  ctx.strokeStyle='rgba(192,57,43,.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(180,H-120);ctx.lineTo(W-180,H-120);ctx.stroke();
  ctx.fillStyle='rgba(180,160,140,.5)';ctx.font='italic 28px Georgia,serif';
  ctx.fillText('kill.me — publica tu ruina diaria',W/2,H-74);
  ctx.fillStyle='rgba(100,90,80,.4)';ctx.font='22px system-ui,sans-serif';
  ctx.fillText(KILLME_URL,W/2,H-38);
  return new Promise(res=>cv.toBlob(res,'image/png'));
}

function señalesHistoryKey(){return`señalesHistory_${user?.id||'x'}`;}
async function loadSeñales(){
  if(!user)return[];
  // Load persisted history first
  let history=[];
  try{history=JSON.parse(localStorage.getItem(señalesHistoryKey())||'[]');}catch(e){}
  // Fetch new items since last check
  const lastCheck=parseInt(localStorage.getItem('señalesCheck')||'0');
  const since=new Date(lastCheck||Date.now()-86400000*7).toISOString();
  let myPosts;try{({data:myPosts}=await sb.from('posts').select('id').eq('user_id',user.id).gte('post_date',new Date(Date.now()-86400000*30).toISOString().slice(0,10)));}catch(e){myPosts=[];}
  const myPostIds=(myPosts||[]).map(p=>p.id);
  const queries=[
    sb.from('follows').select('created_at,follower_id,profiles!follower_id(username)').eq('following_id',user.id).gt('created_at',since).order('created_at',{ascending:false}),
  ];
  if(myPostIds.length)queries.unshift(
    sb.from('deps').select('created_at,user_id,post_id,profiles(username),posts(razon,castigo,dibujo_descripcion)').in('post_id',myPostIds).gt('created_at',since).neq('user_id',user.id).order('created_at',{ascending:false}).limit(50)
  );
  const results=await Promise.all(queries).catch(()=>queries.map(()=>({data:[]})));
  const deps=myPostIds.length?results[0].data||[]:[];
  const follows=results[myPostIds.length?1:0].data||[];
  const newItems=[
    ...deps.map(d=>({type:'dep',time:d.created_at,user:d.profiles?.username||'alguien',uid:d.user_id,postRazon:d.posts?.razon||null,postCastigo:d.posts?.castigo||null,postDescDibujo:d.posts?.dibujo_descripcion||null})),
    ...follows.map(f=>({type:'follow',time:f.created_at,user:f['profiles!follower_id']?.username||f.profiles?.username||'alguien',uid:f.follower_id})),
  ];
  // Merge with history — dedup by time+type+user
  const seen=new Set(history.map(i=>`${i.type}|${i.time}|${i.user}`));
  const merged=[...newItems.filter(i=>!seen.has(`${i.type}|${i.time}|${i.user}`)),...history]
    .sort((a,b)=>new Date(b.time)-new Date(a.time))
    .slice(0,120);
  localStorage.setItem(señalesHistoryKey(),JSON.stringify(merged));
  localStorage.setItem('señalesCheck',Date.now().toString());
  señalesBadge=false;
  return merged;
}
async function checkSeñalesBadge(){
  if(!user||!todayPost)return;
  const lastCheck=parseInt(localStorage.getItem('señalesCheck')||'0');
  if(!lastCheck)return;
  const since=new Date(lastCheck).toISOString();
  const [{count:c1},{count:c2}]=await Promise.all([
    sb.from('deps').select('*',{count:'exact',head:true}).eq('post_id',todayPost.id).gt('created_at',since),
    sb.from('follows').select('*',{count:'exact',head:true}).eq('following_id',user.id).gt('created_at',since),
  ]).catch(()=>[{count:0},{count:0}]);
  señalesBadge=!!((c1||0)+(c2||0)+pendingFriendReqs.length);
}

async function doSignUp(email,pass,uname,color){
  const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username:uname}}});
  if(error)return sbErr(error.message);
  if(data.user){
    try{await sb.from('profiles').upsert({id:data.user.id,username:uname,doll_color:color,email:email});}catch(e){}
  }
  return{user:data.user,session:data.session};
}
async function doSignIn(emailOrUser,pass){
  let email=emailOrUser;
  if(!emailOrUser.includes('@')){
    const {data:prof}=await sb.from('profiles').select('email').eq('username',emailOrUser).maybeSingle();
    if(!prof?.email)return{err:lang==='en'?'User not found. Try with your email.':'Usuario no encontrado. Usa tu email.',user:null};
    email=prof.email;
  }
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)return{err:sbErr(error.message),user:null};
  return{err:null,user:data.user};
}
async function doResetPassword(email){
  if(!email||!email.includes('@'))return t('err_invalid_email');
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://webkillme.github.io/Kill.me/'});
  if(error)return sbErr(error.message);return null;
}

      authStep='color';renderAuth();
    }
  };
}

  }
}

async function loadProfileData(uid){
  const [{data:prof},{data:posts},{data:depRows}]=await Promise.all([
    sb.from('profiles').select('*').eq('id',uid).single(),
    sb.from('posts').select('*').eq('user_id',uid).eq('is_primary',true).order('created_at',{ascending:false}).limit(20),
    sb.from('deps').select('dep_count:post_id.count()').eq('user_id',uid),
  ]).catch(()=>[{data:null},{data:[]},{data:[]}]);
  // total deps = sum of dep_count across their posts
  let depSum;try{({data:depSum}=await sb.from('posts').select('dep_count').eq('user_id',uid));}catch(e){depSum=[];}
  const totalD=(depSum||[]).reduce((s,p)=>s+(p.dep_count||0),0);
  return {prof:prof||{}, posts:posts||[], totalDeps:totalD};
}

function renderMuertes(){
  const streak=profile?.streak||0;
  const dollPx=clamp(56,72);

  function deathRow(d){
    const streakOk=streak>=d.min, depsOk=totalDeps>=d.deps, ok=streakOk&&depsOk;
    // Determine if this is the "next" to unlock in its track
    const isNextStreak=!ok&&!streakOk&&depsOk;
    const isNextDeps=!ok&&streakOk&&!depsOk;

    if(ok){
      return `<div class="death-row dr-unlocked">
        <div class="dr-doll">${dollSVG(profile.doll_color,d.id,true,d.pose,dollPx)}</div>
        <div class="dr-info">
          <div class="dr-name">${dl(d.id)}</div>
          <div class="dr-status ok">${ICO.check}${t('death_ok')}</div>
        </div>
      </div>`;
    }
    if(isNextStreak){
      const pct=Math.min(100,Math.round(streak/d.min*100));
      const left=d.min-streak;
      return `<div class="death-row dr-next-streak">
        <div class="dr-lock">${ICO.lock}</div>
        <div class="dr-info">
          <div class="dr-name">${dl(d.id)}</div>
          <div class="dr-status streak">${left}${t('streak_left')}</div>
          <div class="dr-bar-wrap"><div class="dr-bar-fill streak" style="width:${pct}%"></div></div>
        </div>
        <div class="dr-prog"><div class="dr-prog-num">${streak}<span style="color:var(--muted);font-size:.7em">/${d.min}</span></div><div class="dr-prog-lbl">${t('days_lbl')}</div></div>
      </div>`;
    }
    if(isNextDeps){
      const pct=Math.min(100,Math.round(totalDeps/d.deps*100));
      const left=d.deps-totalDeps;
      return `<div class="death-row dr-next-deps">
        <div class="dr-lock">${ICO.lock}</div>
        <div class="dr-info">
          <div class="dr-name">${dl(d.id)}</div>
          <div class="dr-status deps">${left}${t('deps_left')}</div>
          <div class="dr-bar-wrap"><div class="dr-bar-fill deps" style="width:${pct}%"></div></div>
        </div>
        <div class="dr-prog"><div class="dr-prog-num">${totalDeps}<span style="color:var(--muted);font-size:.7em">/${d.deps}</span></div><div class="dr-prog-lbl">DEPs</div></div>
      </div>`;
    }
    // Locked and not the immediate next — show requirement compactly
    const reqTxt=!streakOk?`${ICO.flame} ${d.min}d ${t('profile_streak')}`:`${ICO.candle} ${d.deps} DEPs`;
    return `<div class="death-row dr-locked">
      <div class="dr-lock">${ICO.lock}</div>
      <div class="dr-info">
        <div class="dr-name">${d.label}</div>
        <div class="dr-status far">${reqTxt}</div>
      </div>
    </div>`;
  }

  const free   =DEATHS.filter(d=>d.min===0&&d.deps===0);
  const byStreak=DEATHS.filter(d=>d.min>0&&d.deps===0).sort((a,b)=>a.min-b.min);
  const byDeps  =DEATHS.filter(d=>d.deps>0&&d.min===0).sort((a,b)=>a.deps-b.deps);

  const unlockedCount=DEATHS.filter(d=>streak>=d.min&&totalDeps>=d.deps).length;

  const tabBar=`<div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;">
      <button id="tabCastigos" style="flex:1;padding:10px;background:none;border:none;border-bottom:2px solid ${muertesTab!=='logros'?'var(--red)':'transparent'};color:${muertesTab!=='logros'?'var(--text)':'var(--muted2)'};font-weight:${muertesTab!=='logros'?700:400};font-size:clamp(12px,3vw,13px);cursor:pointer;">${t('castigos_tab')}</button>
      <button id="tabLogros" style="flex:1;padding:10px;background:none;border:none;border-bottom:2px solid ${muertesTab==='logros'?'var(--red)':'transparent'};color:${muertesTab==='logros'?'var(--text)':'var(--muted2)'};font-weight:${muertesTab==='logros'?700:400};font-size:clamp(12px,3vw,13px);cursor:pointer;">${t('logros_title')}</button>
    </div>`;

  if(muertesTab==='logros'){
    return `<div class="screen">${hdr(t('nav_muertes'))}${tabBar}${renderLogrosContent()}</div>`;
  }

  return `<div class="screen">
    ${hdr(t('nav_muertes'))}
    ${tabBar}
    <div class="deaths-header-stats">
      <div class="dhs-pill"><div class="dhs-num" style="color:var(--warm)">${unlockedCount}<span style="color:var(--muted);font-size:.6em;font-weight:400">/${DEATHS.length}</span></div><div class="dhs-lbl">${t('muertes_unlocked')}</div></div>
      <div class="dhs-pill"><div class="dhs-num">${streak}</div><div class="dhs-lbl">${t('profile_streak')}</div></div>
      <div class="dhs-pill"><div class="dhs-num" style="color:#5A8FD4">${totalDeps}</div><div class="dhs-lbl">DEPs</div></div>
    </div>

    <div class="deaths-section">
      <div class="deaths-section-hdr"><span>${t('muertes_free')}</span></div>
      ${free.map(deathRow).join('')}
    </div>

    <div class="deaths-section">
      <div class="deaths-section-hdr"><span>${t('muertes_streak')}</span></div>
      ${byStreak.map(deathRow).join('')}
    </div>

    <div class="deaths-section">
      <div class="deaths-section-hdr"><span>${t('muertes_deps')}</span></div>
      ${byDeps.map(deathRow).join('')}
    </div>
  </div>`;
}

  if(!feedData.length)return`<div class="screen">${hdr(t('nav_feed'),t('feed_sub'))}<div style="text-align:center;color:var(--muted2);margin-top:40px;font-size:clamp(13px,3.5vw,15px);">${t('feed_empty')}<br><span style="font-size:clamp(11px,3vw,12px);opacity:.45;display:block;margin-top:6px;">${t('feed_empty_sub')}</span></div>${yesterHTML}</div>`;
  const cards=feedData.map(item=>feedCardHTML(item,false)).join('');
  return `<div class="screen">${hdr(t('nav_feed'),t('feed_sub'))}<div class="feed-list">${cards}</div>${yesterHTML}</div>`;
}

function attachListeners(){
  if(view==='home'){
    if(ge('empezar'))ge('empezar').onclick=()=>{draftRazon='';view='razon';paint();};
    if(ge('btnInstrHome'))ge('btnInstrHome').onclick=()=>showOnboarding();
    if(ge('goFeed'))ge('goFeed').onclick=async()=>{await loadFeed();view='feed';paint();};
    if(ge('btnPeor'))ge('btnPeor').onclick=()=>{draftRazon='';view='razon';paint();};
    if(ge('btnShare'))ge('btnShare').onclick=()=>showShareMenu(todayPost);
    if(ge('btnDeletePost'))ge('btnDeletePost').onclick=async()=>{
      if(!confirm(t('confirm_delete')))return;
      const deletingId=todayPost.id;
      const prevId=todayPost.previous_post_id||null;
      const {error}=await sb.from('posts').delete().eq('id',deletingId).eq('user_id',user.id);
      if(error){alert('Error al borrar: '+(error.message||'inténtalo de nuevo'));return;}
      cemeteryPosts=null;feedData=null;
      if(prevId){
        // Restore previous post as the primary for today
        try{await sb.from('posts').update({is_primary:true}).eq('id',prevId);}catch(e){}
        let restored=null;
        try{({data:restored}=await sb.from('posts').select('*').eq('id',prevId).single());}catch(e){}
        todayPost=restored||null;
        todayPrevPost=null;
        view='home';paint();
      }else{
        // No previous post — roll back streak but keep last_post_date=yesterday so tomorrow still continues
        const prevStreak=Math.max(0,(profile.streak||1)-1);
        const prevDate=prevStreak>0?yesterS():null;
        try{await sb.from('profiles').update({streak:prevStreak,last_post_date:prevDate}).eq('id',user.id);}catch(e){}
        profile.streak=prevStreak;
        todayPost=null;todayPrevPost=null;view='home';paint();
      }
    };
    if(ge('btnCemetery'))ge('btnCemetery').onclick=()=>{view='cementerio';paint();};
    if(ge('cemeteryCount')){
      (async()=>{
        let count=0;try{({count}=await sb.from('posts').select('id',{count:'exact',head:true}).eq('user_id',user.id).eq('is_primary',true));}catch(e){}
        const el=ge('cemeteryCount');
        if(el)el.textContent=t('cemetery_sub').replace('$n',count||0);
      })();
    }
    if(ge('btnTogglePrev')){
      ge('btnTogglePrev').onclick=()=>{
        if(expandedPrev.has('home'))expandedPrev.delete('home');else expandedPrev.add('home');
        ge('btnTogglePrev').classList.toggle('open');
        ge('prevPanel').classList.toggle('open');
      };
    }
  }
  if(view==='razon'){
    const ta=ge('razonInput'),btn=ge('btnElegirCastigo'),cnt=ge('razonInputCount');
    if(ta){ta.oninput=()=>{draftRazon=ta.value;cnt.textContent=`${draftRazon.length}/280`;btn.disabled=draftRazon.trim().length<2;};}
    if(btn)btn.onclick=()=>{view='muerte';paint();};
    if(ge('volverRazon'))ge('volverRazon').onclick=()=>{view='home';paint();};
  }
  if(view==='muerte'){
    document.querySelectorAll('.dcell.on').forEach(c=>{c.onclick=()=>promptConfirmDeath(c.getAttribute('data-death'));});
    if(ge('drawCard'))ge('drawCard').onclick=()=>{view='dibujo';paint();};
    if(ge('volverMuerte'))ge('volverMuerte').onclick=()=>{view='razon';paint();};
  }
  if(view==='dibujo'){
    ge('razonDibujo').oninput=e=>{draftRazon=e.target.value;ge('razonCount').textContent=`${draftRazon.length}/280`;checkDraw();};
    ge('descDibujo').oninput=checkDraw;
    ge('volverFormas').onclick=()=>{view='muerte';paint();};
  }
  if(view==='posted'){
    if(ge('irAlFeed'))ge('irAlFeed').onclick=async()=>{await loadFeed();view='feed';paint();};
  }
  if(view==='feed'){
    document.querySelectorAll('.dep-btn').forEach(b=>{b.onclick=async()=>await toggleDep(b.getAttribute('data-pid'));});
    document.querySelectorAll('.follow-btn').forEach(b=>{b.onclick=async()=>await toggleFollow(b.getAttribute('data-uid'));});
    document.querySelectorAll('.doll-expand-btn').forEach(b=>{b.onclick=(e)=>{
      e.stopPropagation();
      const pid=b.getAttribute('data-pid');
      const item=[...feedData,...(feedData.flatMap(x=>x._prev?[x._prev]:[])||[])].find(x=>x.id===pid)||feedData.find(x=>x.id===pid);
      if(!item)return;
      expandedDollItem=item;
      showDollModal(item);
    };});
    document.querySelectorAll('[data-feedprev]').forEach(btn=>{
      btn.onclick=()=>{
        const id=btn.getAttribute('data-feedprev');
        if(expandedPrev.has(id))expandedPrev.delete(id);else expandedPrev.add(id);
        btn.classList.toggle('open');btn.nextElementSibling.classList.toggle('open');
      };
    });
    document.querySelectorAll('[data-tomb]').forEach(btn=>{
      btn.onclick=(e)=>{
        e.stopPropagation();
        const id=btn.getAttribute('data-tomb');
        if(expandedTombstone.has(id))expandedTombstone.delete(id);else expandedTombstone.add(id);
        paint();
      };
    });
    if(ge('btnLoadMorePrev'))ge('btnLoadMorePrev').onclick=()=>{feedPreviousShown+=10;paint();};
  }
  if(view==='buscar'){
    const inp=ge('searchInput');
    if(inp){
      inp.focus();
      let debounce;
      inp.oninput=()=>{
        searchQuery=inp.value.trim();
        clearTimeout(debounce);
        if(!searchQuery){searchResults=null;paint();return;}
        debounce=setTimeout(async()=>{
          let data;try{({data}=await sb.from('profiles').select('*').ilike('username','%'+searchQuery+'%').limit(20));}catch(e){data=[];}
          searchResults=data||[];
          paint();
        },300);
      };
    }
    document.querySelectorAll('.search-result').forEach(row=>{
      row.onclick=async()=>{
        profileReturnView='buscar';
        viewingProfile=await loadProfileData(row.getAttribute('data-uid'));
        view='profile';paint();
      };
    });
  }
  if(view==='ajustes'){
    document.querySelectorAll('.ccircle').forEach(c=>{
      c.onclick=async()=>{
        profile.doll_color=c.getAttribute('data-color');
        await sb.from('profiles').update({doll_color:profile.doll_color}).eq('id',user.id);
        paint();
      };
    });
    if(ge('volverAjustes'))ge('volverAjustes').onclick=()=>{view=todayPost?'feed':'home';paint();};
    if(ge('btnViewOwnProfile'))ge('btnViewOwnProfile').onclick=async()=>{profileReturnView='ajustes';viewingProfile=await loadProfileData(user.id);view='profile';paint();};
    if(ge('btnInstructions'))ge('btnInstructions').onclick=()=>showOnboarding();
    if(ge('btnChangePass'))ge('btnChangePass').onclick=async()=>{
      const btn=ge('btnChangePass');
      btn.disabled=true;btn.textContent='Enviando...';
      const {error}=await sb.auth.resetPasswordForEmail(user.email,{redirectTo:location.origin+location.pathname});
      btn.disabled=false;btn.textContent=t('btn_change_pass');
      if(error){alert('Error: '+sbErr(error.message));}
      else{alert(t('pass_email_sent'));}
    };
    if(ge('btnLangEs'))ge('btnLangEs').onclick=()=>{if(lang!=='es'){lang='es';localStorage.setItem('kill_lang','es');paint();}};
    if(ge('btnLangEn'))ge('btnLangEn').onclick=()=>{if(lang!=='en'){lang='en';localStorage.setItem('kill_lang','en');paint();}};

    if(ge('btnSaveBirthday'))ge('btnSaveBirthday').onclick=async()=>{
      const val=ge('birthdayInput').value;
      if(!val)return;
      const btn=ge('btnSaveBirthday');
      btn.disabled=true;btn.textContent='...';
      try{
        const {error}=await sb.from('profiles').update({birth_date:val}).eq('id',user.id);
        if(error&&error.message&&error.message.includes('birth_date')){
          profile.birth_date=val;
          localStorage.setItem('killme_birth_'+user.id,val);
          paint();return;
        }
        if(error)throw error;
        profile.birth_date=val;
        localStorage.setItem('killme_birth_'+user.id,val);
        paint();
      }catch(e){
        btn.disabled=false;btn.textContent=t('btn_save_birthday');
        alert('Error al guardar: '+(e.message||'inténtalo de nuevo'));
      }
    };
    if(ge('btnLogout'))ge('btnLogout').onclick=async()=>{
      await sb.auth.signOut().catch(()=>{});
      user=null;profile=null;todayPost=null;todayPrevPost=null;
      feedData=[];myDeps=new Set();myFollowing=new Set();expandedPrev=new Set();
      cemeteryPosts=null;followersList=null;friendsList=null;
      navigating=false;authStep='form';view='auth';paint();
    };
  }
  if(view==='amigos'){
    if(ge('tabFollowing'))ge('tabFollowing').onclick=()=>{amigosTab='following';paint();};
    if(ge('tabFollowers'))ge('tabFollowers').onclick=()=>{
      amigosTab='followers';
      if(followersList===null){
        (async()=>{
          let fids=[];
          try{const {data:rows}=await sb.from('follows').select('follower_id').eq('following_id',user.id);fids=(rows||[]).map(r=>r.follower_id);}catch(e){}
          if(!fids.length){followersList=[];paint();return;}
          let data;try{({data}=await sb.from('profiles').select('*').in('id',fids));}catch(e){data=[];}
          followersList=data||[];paint();
        })();
      }
      paint();
    };
    if(amigosTab==='following'&&!friendsList){
      (async()=>{
        const ids=[...myFollowing];
        if(!ids.length){friendsList=[];paint();return;}
        let data;try{({data}=await sb.from('profiles').select('*').in('id',ids));}catch(e){data=[];}
        friendsList=data||[];
        paint();
      })();
    }
    document.querySelectorAll('.fr-accept-inline').forEach(btn=>{
      btn.onclick=async(e)=>{e.stopPropagation();await acceptFriendRequest(btn.getAttribute('data-reqid'),btn.getAttribute('data-senderid'));};
    });
    document.querySelectorAll('.fr-reject-inline').forEach(btn=>{
      btn.onclick=async(e)=>{e.stopPropagation();await rejectFriendRequest(btn.getAttribute('data-reqid'));};
    });
    document.querySelectorAll('.amigo-row:not(.fr-row)').forEach(row=>{
      row.onclick=async()=>{
        profileReturnView='amigos';
        viewingProfile=await loadProfileData(row.getAttribute('data-uid'));
        view='profile';paint();
      };
    });
    document.querySelectorAll('.fr-row').forEach(row=>{
      row.onclick=async()=>{
        const uid=row.getAttribute('data-uid');if(!uid)return;
        profileReturnView='amigos';
        viewingProfile=await loadProfileData(uid);
        view='profile';paint();
      };
    });
  }
  if(view==='muertes'){
    if(ge('tabCastigos'))ge('tabCastigos').onclick=()=>{muertesTab='castigos';paint();};
    if(ge('tabLogros'))ge('tabLogros').onclick=()=>{muertesTab='logros';paint();};
    if(ge('volverLogros'))ge('volverLogros').onclick=()=>{muertesTab='castigos';paint();};

          else if(pinnedLogros.length<3)pinnedLogros=[...pinnedLogros,aid];
          localStorage.setItem('pinnedLogros',JSON.stringify(pinnedLogros));
          paint();
        };
      });
    }
  }
  if(view==='cementerio'){
    if(ge('volverCemetery'))ge('volverCemetery').onclick=()=>{view='home';paint();};
    document.querySelectorAll('.cem-filter').forEach(b=>{b.onclick=()=>{cemeteryVisFilter=b.getAttribute('data-vf');paint();};});
  }
  if(view==='logros'){
    if(ge('volverLogros'))ge('volverLogros').onclick=()=>{view='muertes';muertesTab='castigos';paint();};
    document.querySelectorAll('.logro-pin-btn').forEach(btn=>{
      btn.onclick=()=>{
        const aid=btn.getAttribute('data-aid');

        else if(pinnedLogros.length<3){pinnedLogros=[...pinnedLogros,aid];}

        paint();
      };

        paint();
      }

  if(view==='señales'){

        viewingProfile=await loadProfileData(uid);

      if(!open)b.classList.add('tip-open');

    if(!e.target.closest('.logro-badge'))document.querySelectorAll('.logro-badge.tip-open').forEach(x=>x.classList.remove('tip-open'));
  },{passive:true});

  if(view==='profile'){
    const afb=ge('profileAcceptFriend');

      await acceptFriendRequest(afb.getAttribute('data-reqid'),afb.getAttribute('data-senderid'));
      const uid=afb.getAttribute('data-senderid');
      viewingProfile=await loadProfileData(uid);
      paint();
    };
  }
  // Feed: click avatar → open profile
  document.querySelectorAll('.feed-avatar-btn').forEach(btn=>{
    btn.onclick=async(e)=>{
      e.stopPropagation();
      const uid=btn.getAttribute('data-uid');
      profileReturnView='feed';
      viewingProfile=await loadProfileData(uid);
      view='profile';paint();
    };
  });
}

function checkDraw(){
  const r=ge('razonDibujo')?.value.trim(),d=ge('descDibujo')?.value.trim();
  const b=ge('guardarDibujo');if(b)b.disabled=!(r&&d&&window.__strokes?.length>0);
}

function setupCanvas(){
  const cv=ge('drawCanvas');if(!cv)return;
  const ctx=cv.getContext('2d');
  let drawing=false,curC=LINE_COLORS[0],curW=LINE_WIDTHS[1],cur=null;
  window.__strokes=[];
  function guide(){ctx.clearRect(0,0,220,280);}
  function redraw(){guide();window.__strokes.forEach(s=>{ctx.strokeStyle=s.color;ctx.lineWidth=s.grosor;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();s.puntos.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();});}
  function pos(e){const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)};}
  cv.addEventListener('mousedown',e=>{e.preventDefault();drawing=true;cur={puntos:[pos(e)],color:curC,grosor:curW};});
  cv.addEventListener('mousemove',e=>{if(!drawing)return;e.preventDefault();const p=pos(e);cur.puntos.push(p);const pts=cur.puntos;ctx.strokeStyle=curC;ctx.lineWidth=curW;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(pts[pts.length-2].x,pts[pts.length-2].y);ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);ctx.stroke();});
  const end=()=>{if(drawing&&cur){window.__strokes.push(cur);cur=null;checkDraw();}drawing=false;};
  cv.addEventListener('mouseup',end);cv.addEventListener('mouseleave',end);
  cv.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;cur={puntos:[pos(e)],color:curC,grosor:curW};},{passive:false});
  cv.addEventListener('touchmove',e=>{if(!drawing)return;e.preventDefault();const p=pos(e);cur.puntos.push(p);const pts=cur.puntos;ctx.strokeStyle=curC;ctx.lineWidth=curW;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(pts[pts.length-2].x,pts[pts.length-2].y);ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);ctx.stroke();},{passive:false});
  cv.addEventListener('touchend',end);
  document.querySelectorAll('.swatch').forEach(s=>{s.onclick=()=>{curC=s.getAttribute('data-color');document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on'));s.classList.add('on');};});
  document.querySelectorAll('.wbtn').forEach(b=>{b.onclick=()=>{curW=parseInt(b.getAttribute('data-width'));document.querySelectorAll('.wbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');};});
  ge('clearCanvas').onclick=()=>{window.__strokes=[];redraw();checkDraw();};
  document.querySelectorAll('#visDrawSelector label').forEach(lbl=>{
    lbl.onclick=()=>{
      window._postVisibility=lbl.querySelector('input').value;
      document.querySelectorAll('#visDrawSelector label').forEach(l=>{
        const v=l.querySelector('input').value,on=v===window._postVisibility;
        l.style.borderColor=on?'var(--warm)':'var(--border2)';
        l.style.background=on?'rgba(176,120,48,.06)':'transparent';
        l.querySelector('span').style.color=on?'var(--text)':'var(--text2)';
      });
    };
  });
  ge('guardarDibujo').onclick=async()=>{
    const r=ge('razonDibujo').value.trim(),d=ge('descDibujo').value.trim();
    const btn=ge('guardarDibujo');btn.disabled=true;btn.textContent='...';
    await submitPost({razon:r,castigo:'dibujo',dibujo:{trazos:window.__strokes,descripcion:d}});
  };
  guide();
}

// ── Init ──────────────────────────────────────────────
async function init(){
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_OUT'){
      user=null;profile=null;todayPost=null;navigating=false;
      authStep='form';view='auth';paint();
    } else if(event==='PASSWORD_RECOVERY'){
      view='recovery';paint();
    } else if((event==='SIGNED_IN'||event==='USER_UPDATED')&&session?.user&&!navigating&&view!=='recovery'){
      if(view==='loading'||view==='verify'||view==='auth'){
        navigating=true;user=session.user;
        await navToHome();
      }
    }
  });
  try{
    const res=await safeGetSession();
    const session=res?.data?.session;
    if(session?.user){
      user=session.user;
      await loadProfile();
      if(!profile){
        const u=user.user_metadata?.username||user.email.split('@')[0];
        try{await sb.from('profiles').upsert({id:user.id,username:u,doll_color:DOLL_COLORS[0],email:user.email});}catch(e){}
        await loadProfile();
      }
      await loadTodayPost();
      await loadFollows();
      if(todayPost){await loadFeed();view='feed';}else{view='home';}
    }else{view='auth';}
  }catch(e){console.error('init error',e);view='auth';}
  paint();
}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

// Pull-to-refresh (swipe down at top of page)
(()=>{
  let startY=0,pulling=false,indicator=null;
  document.addEventListener('touchstart',e=>{if(window.scrollY===0){startY=e.touches[0].clientY;pulling=true;}},{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!pulling)return;
    const dy=e.touches[0].clientY-startY;
    if(dy>10&&!indicator){
      indicator=document.createElement('div');
      indicator.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;height:3px;background:var(--warm,#B07830);animation:ptr-slide .4s ease;';
      document.body.appendChild(indicator);
    }
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!pulling)return;
    const dy=e.changedTouches[0].clientY-startY;
    if(indicator){indicator.remove();indicator=null;}
    pulling=false;
    if(dy>60&&window.scrollY===0&&(view==='feed'||view==='home')){loadFeed().then(()=>paint());}
  },{passive:true});
})();
init();
</script>
