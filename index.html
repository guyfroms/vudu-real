<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<title>VudГєReal</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0B0910"/>
<link rel="apple-touch-icon" href="icons/icon-180.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0B0910; --bg2:#120D18; --panel:#1C1226; --panel2:#261834; --panel3:#32204A;
  --amber:#C8893A; --amber2:#E0A050;
  --coral:#9C3048; --coral2:#B83858;
  --bone:#EDE5D5; --bone2:#BFB5A2;
  --border:#2A1E38; --border2:#3D2E50;
  --muted:#5A4870; --muted2:#8A7898;
  --glow:rgba(200,137,58,.12); --glowC:rgba(156,48,72,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html{height:100%;background:var(--bg);}
body{
  font-family:-apple-system,system-ui,'Segoe UI',sans-serif;
  background:radial-gradient(ellipse 140% 50% at 50% -5%, var(--panel3), var(--bg) 60%);
  color:var(--bone);min-height:100vh;
  max-width:520px;margin:0 auto;
  font-size:clamp(14px,3.5vw,16px);
}
.cinzel{font-family:'Cinzel',Georgia,serif;}

/* в”Ђв”Ђ Scrollbar в”Ђв”Ђ */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* в”Ђв”Ђ Animations в”Ђв”Ђ */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.015)}}
@keyframes floatSlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes flicker{0%,100%{opacity:.9;transform:scaleY(1)}45%{opacity:1;transform:scaleY(1.1) scaleX(.95)}70%{opacity:.85;transform:scaleY(.95)}}
@keyframes shockPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5) saturate(1.3)}}
@keyframes dropIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* в”Ђв”Ђ Loading в”Ђв”Ђ */
.pg-load{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.pg-load .brand{font-family:'Cinzel',serif;font-size:clamp(22px,6vw,28px);font-weight:900;letter-spacing:3px;color:var(--amber);opacity:0;animation:fadeUp .5s .2s forwards;}
.pg-load .brand em{color:var(--coral2);font-style:normal;}
.spin{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;}

/* в”Ђв”Ђ Auth в”Ђв”Ђ */
.auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(20px,5vw,40px) clamp(16px,4vw,28px);animation:fadeUp .35s ease;}
.auth-brand{text-align:center;margin-bottom:28px;}
.auth-brand h1{font-family:'Cinzel',serif;font-size:clamp(28px,7vw,36px);font-weight:900;letter-spacing:3px;color:var(--amber);line-height:1;}
.auth-brand h1 em{color:var(--coral2);font-style:normal;}
.auth-brand p{color:var(--muted2);font-size:clamp(11px,2.5vw,13px);margin-top:8px;letter-spacing:.5px;}
.auth-doll-preview{display:flex;justify-content:center;margin-bottom:20px;}
.auth-card{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:clamp(18px,4vw,28px);box-shadow:0 16px 60px rgba(0,0,0,.5);}
.auth-tabs{display:flex;background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:20px;}
.auth-tab{flex:1;padding:11px;background:transparent;border:none;color:var(--muted2);font-weight:700;font-size:clamp(12px,3vw,13px);cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.auth-tab.on{background:var(--panel2);color:var(--bone);}
.field{margin-bottom:13px;}
.field label{display:block;font-size:clamp(9px,2vw,10px);color:var(--muted2);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.field input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--bone);padding:clamp(10px,2.5vw,13px) 14px;font-size:clamp(14px,3.5vw,15px);font-family:inherit;transition:border-color .2s;outline:none;-webkit-appearance:none;}
.field input:focus{border-color:var(--amber);}
.pass-hint{font-size:clamp(10px,2.5vw,11px);color:var(--muted);margin-top:5px;line-height:1.5;}
.auth-err{color:#D05540;font-size:clamp(11px,2.5vw,12px);min-height:16px;margin-bottom:8px;text-align:center;}
.step-label{font-size:clamp(10px,2.5vw,11px);color:var(--muted2);text-align:center;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px;}
.onb-colors{display:flex;justify-content:center;gap:clamp(10px,3vw,16px);flex-wrap:wrap;margin:20px 0;}
.onb-circle{width:clamp(36px,9vw,44px);height:clamp(36px,9vw,44px);border-radius:50%;border:3px solid transparent;cursor:pointer;padding:0;transition:all .2s;}
.onb-circle.on{border-color:var(--bone);transform:scale(1.18);}

/* в”Ђв”Ђ Buttons в”Ђв”Ђ */
.btn{width:100%;border:none;border-radius:14px;padding:clamp(12px,3vw,15px);font-weight:800;font-size:clamp(13px,3.5vw,15px);cursor:pointer;letter-spacing:.4px;transition:all .18s;font-family:inherit;}
.btn-coral{background:linear-gradient(135deg,var(--coral),var(--coral2));color:var(--bone);}
.btn-coral:hover{filter:brightness(1.1);}
.btn-coral:disabled{background:var(--muted);cursor:default;filter:none;color:var(--muted2);}
.btn-amber{background:linear-gradient(135deg,var(--amber),var(--amber2));color:#1a0e0a;font-weight:900;}
.btn-amber:hover{filter:brightness(1.08);}
.btn-amber-sm{display:inline-block;background:linear-gradient(135deg,var(--amber),var(--amber2));color:#1a0e0a;border:none;border-radius:12px;padding:clamp(10px,2.5vw,12px) clamp(20px,5vw,28px);font-weight:800;font-size:clamp(12px,3vw,14px);cursor:pointer;letter-spacing:.3px;transition:all .18s;}
.btn-amber-sm:hover{filter:brightness(1.08);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted2);border-radius:14px;padding:clamp(11px,2.5vw,13px);font-weight:700;font-size:clamp(12px,3vw,13px);cursor:pointer;width:100%;transition:all .2s;font-family:inherit;}
.btn-ghost:hover{border-color:var(--muted);color:var(--bone2);}
.btn-link{background:none;border:none;color:var(--muted2);font-size:clamp(12px,3vw,13px);cursor:pointer;text-align:center;width:100%;padding:12px;display:block;transition:color .2s;font-family:inherit;}
.btn-link:hover{color:var(--bone2);}

/* в”Ђв”Ђ Layout в”Ђв”Ђ */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:max(env(safe-area-inset-top),16px) clamp(14px,4vw,20px) 0;}
.logo{font-family:'Cinzel',serif;font-weight:900;letter-spacing:2px;font-size:clamp(13px,3.5vw,16px);color:var(--bone);}
.logo em{color:var(--coral2);font-style:normal;}
.topbar-r{display:flex;align-items:center;gap:10px;}
.streak-pill{background:var(--panel2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:clamp(10px,2.5vw,12px);font-weight:700;color:var(--amber);display:flex;align-items:center;gap:5px;}
.gear-btn{background:none;border:none;cursor:pointer;color:var(--muted2);display:flex;align-items:center;padding:4px;transition:color .2s;}
.gear-btn:hover{color:var(--bone2);}
.screen{padding:clamp(16px,4vw,22px);padding-bottom:clamp(90px,22vw,110px);animation:fadeUp .28s ease;}
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;
  background:rgba(18,13,24,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:flex;padding:clamp(10px,3vw,13px) 0 max(calc(10px + env(safe-area-inset-bottom)),14px);
}
.navbtn{flex:1;background:none;border:none;color:var(--muted);font-weight:700;font-size:clamp(9px,2.5vw,11px);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s;letter-spacing:.3px;}
.navbtn.on{color:var(--amber);}
.navbtn svg{transition:transform .2s;}
.navbtn.on svg{transform:scale(1.12);}

/* в”Ђв”Ђ Page title в”Ђв”Ђ */
.ptitle{font-family:'Cinzel',serif;color:var(--amber);font-size:clamp(17px,4.5vw,21px);font-weight:700;text-align:center;letter-spacing:.5px;line-height:1.3;}
.psub{color:var(--muted2);font-size:clamp(11px,2.8vw,13px);text-align:center;margin-top:5px;}
.rule{width:36px;height:1px;background:var(--border2);margin:14px auto;}

/* в”Ђв”Ђ Doll в”Ђв”Ђ */
.doll-wrap{position:relative;display:inline-flex;justify-content:center;}

/* в”Ђв”Ђ Death grid в”Ђв”Ђ */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,2.5vw,12px);margin-top:16px;}
.dcell{
  background:var(--panel);border:1px solid var(--border);border-radius:18px;
  padding:clamp(12px,3vw,16px) 8px;
  display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.dcell.on{border-color:var(--amber);box-shadow:0 0 14px var(--glow);}
.dcell.on:hover{background:var(--panel2);}
.dcell.off{opacity:.35;cursor:default;}
.dcell .dlabel{color:var(--bone);font-size:clamp(11px,3vw,13px);font-weight:700;letter-spacing:.2px;text-align:center;}
.dcell .dreq{color:var(--muted2);font-size:clamp(9px,2.5vw,10px);}
.draw-cell{
  grid-column:span 2;background:var(--panel);border:1px dashed var(--amber);border-radius:18px;
  padding:clamp(14px,3.5vw,18px);display:flex;align-items:center;justify-content:center;gap:14px;
  cursor:pointer;transition:background .2s;
}
.draw-cell:hover{background:var(--panel2);}
.draw-cell .dlabel{color:var(--amber);font-size:clamp(13px,3.5vw,15px);font-weight:700;}
.draw-cell .dsub{color:var(--muted2);font-size:clamp(10px,2.5vw,11px);margin-top:2px;}

/* в”Ђв”Ђ Feed в”Ђв”Ђ */
.feed-card{background:var(--panel);border-radius:20px;padding:clamp(14px,3.5vw,18px);margin-bottom:clamp(10px,2.5vw,14px);border:1px solid var(--border);animation:fadeUp .25s ease;}
.feed-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.avatar{width:clamp(28px,7vw,34px);height:clamp(28px,7vw,34px);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:clamp(10px,2.5vw,12px);color:rgba(0,0,0,.55);}
.feed-meta{flex:1;min-width:0;}
.feed-name{color:var(--bone);font-weight:700;font-size:clamp(13px,3.5vw,14px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.feed-time{color:var(--muted2);font-size:clamp(10px,2.5vw,11px);}
.friend-tag{background:var(--panel3);border:1px solid var(--border2);border-radius:8px;padding:2px 7px;font-size:clamp(9px,2vw,10px);font-weight:700;color:var(--amber);letter-spacing:.5px;white-space:nowrap;}
.feed-razon{color:var(--bone2);font-size:clamp(13px,3.5vw,14px);margin:4px 0 8px;line-height:1.55;border-left:2px solid var(--border2);padding-left:10px;}
.feed-castigo{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);border-radius:8px;padding:3px 10px;font-size:clamp(10px,2.5vw,11px);font-weight:700;color:var(--amber);margin-bottom:12px;letter-spacing:.3px;}
.dep-btn{
  width:100%;border-radius:12px;padding:clamp(9px,2.5vw,11px);color:var(--bone2);
  font-weight:700;font-size:clamp(12px,3vw,13px);
  border:1px solid var(--coral);background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:all .22s;letter-spacing:.3px;
}
.dep-btn.given{background:var(--coral);border-color:var(--coral2);color:var(--bone);}
.dep-btn:not(.given):hover{background:var(--glowC);}
.dep-count{color:var(--amber);font-weight:900;}
.follow-btn{
  background:transparent;border:1px solid var(--border2);border-radius:10px;
  padding:5px 12px;color:var(--muted2);font-size:clamp(10px,2.5vw,11px);font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.3px;white-space:nowrap;flex-shrink:0;font-family:inherit;
}
.follow-btn.following{background:var(--panel3);border-color:var(--border2);color:var(--amber);}
.own-dep{text-align:center;color:var(--muted);font-size:clamp(11px,3vw,12px);padding:8px;}

/* в”Ђв”Ђ Canvas draw в”Ђв”Ђ */
canvas{background:var(--panel2);border-radius:18px;border:1px solid var(--border2);touch-action:none;display:block;margin:0 auto;max-width:100%;}
.swatches{display:flex;justify-content:center;gap:clamp(8px,2vw,12px);margin-top:12px;flex-wrap:wrap;}
.swatch{width:clamp(20px,5vw,26px);height:clamp(20px,5vw,26px);border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;transition:transform .15s;}
.swatch.on{border-color:var(--bone);transform:scale(1.22);}
.wrow{display:flex;justify-content:center;gap:10px;margin-top:10px;align-items:center;}
.wbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.wbtn.on{border-color:var(--amber);background:var(--panel2);}
.wdot{border-radius:50%;background:var(--bone);}
.clearbtn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted2);font-size:clamp(10px,2.5vw,11px);padding:6px 12px;cursor:pointer;transition:all .2s;font-family:inherit;}
.clearbtn:hover{border-color:var(--muted);}

/* в”Ђв”Ђ Settings в”Ђв”Ђ */
.colorpick{display:flex;justify-content:center;gap:clamp(10px,3vw,16px);flex-wrap:wrap;margin-top:20px;}
.ccircle{width:clamp(34px,8vw,42px);height:clamp(34px,8vw,42px);border-radius:50%;border:3px solid transparent;cursor:pointer;padding:0;transition:all .2s;}
.ccircle.on{border-color:var(--amber);transform:scale(1.18);}
.stat-block{background:var(--panel2);border:1px solid var(--border);border-radius:16px;padding:clamp(14px,3.5vw,18px);text-align:center;margin-top:20px;}
.stat-num{font-family:'Cinzel',serif;font-size:clamp(28px,7vw,36px);font-weight:900;color:var(--amber);line-height:1;}
.stat-label{color:var(--muted2);font-size:clamp(10px,2.5vw,11px);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

/* в”Ђв”Ђ Forms в”Ђв”Ђ */
textarea,input[type=text],input[type=email],input[type=password]{
  width:100%;background:var(--panel);border:1px solid var(--border2);border-radius:14px;
  color:var(--bone);padding:clamp(10px,2.5vw,13px) 14px;
  font-size:clamp(14px,3.5vw,15px);font-family:inherit;outline:none;transition:border-color .2s;-webkit-appearance:none;
}
textarea{min-height:76px;resize:none;}
textarea:focus,input:focus{border-color:var(--amber);}
.charcount{text-align:right;font-size:clamp(10px,2.5vw,11px);color:var(--muted);margin-top:4px;}

/* в”Ђв”Ђ Card done в”Ђв”Ђ */
.done-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:clamp(14px,3.5vw,20px);text-align:center;margin-top:16px;}
.done-razon{color:var(--bone2);font-style:italic;font-size:clamp(13px,3.5vw,14px);line-height:1.55;margin-bottom:8px;}
.done-castigo{color:var(--amber);font-weight:800;font-size:clamp(13px,3.5vw,14px);}
/* в”Ђв”Ђ Peor / anterior в”Ђв”Ђ */
.peor-btn{margin-top:14px;background:none;border:1px dashed var(--coral);border-radius:14px;padding:11px 20px;color:var(--coral2);font-size:clamp(12px,3vw,13px);font-weight:700;cursor:pointer;width:100%;letter-spacing:.3px;transition:all .2s;font-family:inherit;}
.peor-btn:hover{background:var(--glowC);}
.prev-toggle{background:none;border:none;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:clamp(10px,2.5vw,11px);cursor:pointer;padding:10px 0 0;transition:color .2s;font-family:inherit;letter-spacing:.3px;}
.prev-toggle:hover{color:var(--muted2);}
.prev-toggle svg{transition:transform .2s;}
.prev-toggle.open svg{transform:rotate(180deg);}
.prev-panel{overflow:hidden;max-height:0;transition:max-height .35s ease;opacity:.55;}
.prev-panel.open{max-height:400px;}
.prev-inner{padding:12px 0 4px;border-top:1px solid var(--border);margin-top:10px;}
.prev-label{font-size:clamp(9px,2.5vw,10px);text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:center;margin-bottom:8px;}
.prev-razon{color:var(--muted2);font-style:italic;font-size:clamp(11px,3vw,12px);text-align:center;margin-top:6px;line-height:1.5;}
.prev-castigo{color:var(--muted);font-size:clamp(10px,2.5vw,11px);font-weight:700;text-align:center;margin-top:3px;}

/* в”Ђв”Ђ Responsive desktop bump в”Ђв”Ђ */
@media(min-width:560px){
  .auth-page{padding-top:60px;padding-bottom:60px;}
  .bottomnav{border-radius:0;}
}
@media(min-width:768px){
  .screen{padding-left:clamp(22px,5vw,32px);padding-right:clamp(22px,5vw,32px);}
}
</style>
</head>
<body>
<div id="root"><div class="pg-load"><div class="brand cinzel">VUDГљ<em>REAL</em></div><div class="spin"></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const {createClient}=supabase;

const DOLL_COLORS=["#C24545","#4577C2","#45A87A","#B87830","#8845C2","#D0C8B8"];

// в”Ђв”Ђ Poses в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function getPose(name,w,h){
  const P={
    idle:{body:`M${w/2} ${h*.29}Q${w*.46} ${h*.46} ${w/2} ${h*.62}`,aL:`M${w/2} ${h*.38}Q${w*.3} ${h*.41} ${w*.23} ${h*.53}`,aR:`M${w/2} ${h*.38}Q${w*.7} ${h*.41} ${w*.77} ${h*.53}`,lL:`M${w/2} ${h*.62}Q${w*.34} ${h*.79} ${w*.27} ${h*.96}`,lR:`M${w/2} ${h*.62}Q${w*.66} ${h*.79} ${w*.73} ${h*.96}`},
    scared:{body:`M${w/2} ${h*.29}Q${w*.46} ${h*.46} ${w/2} ${h*.62}`,aL:`M${w/2} ${h*.38}Q${w*.26} ${h*.24} ${w*.18} ${h*.1}`,aR:`M${w/2} ${h*.38}Q${w*.74} ${h*.24} ${w*.82} ${h*.1}`,lL:`M${w/2} ${h*.62}Q${w*.36} ${h*.77} ${w*.28} ${h*.96}`,lR:`M${w/2} ${h*.62}Q${w*.64} ${h*.77} ${w*.72} ${h*.96}`},
    cowering:{body:`M${w/2} ${h*.29}Q${w*.47} ${h*.42} ${w*.5} ${h*.57}`,aL:`M${w/2} ${h*.36}Q${w*.33} ${h*.28} ${w*.27} ${h*.18}`,aR:`M${w/2} ${h*.36}Q${w*.67} ${h*.28} ${w*.73} ${h*.18}`,lL:`M${w*.5} ${h*.57}Q${w*.37} ${h*.71} ${w*.31} ${h*.88}`,lR:`M${w*.5} ${h*.57}Q${w*.63} ${h*.71} ${w*.69} ${h*.88}`},
    begging:{body:`M${w/2} ${h*.29}Q${w*.46} ${h*.46} ${w/2} ${h*.62}`,aL:`M${w/2} ${h*.38}Q${w*.3} ${h*.48} ${w*.15} ${h*.55}`,aR:`M${w/2} ${h*.38}Q${w*.7} ${h*.48} ${w*.85} ${h*.55}`,lL:`M${w/2} ${h*.62}Q${w*.34} ${h*.79} ${w*.27} ${h*.96}`,lR:`M${w/2} ${h*.62}Q${w*.66} ${h*.79} ${w*.73} ${h*.96}`},
    dramatic:{body:`M${w/2} ${h*.29}Q${w*.46} ${h*.46} ${w/2} ${h*.62}`,aL:`M${w/2} ${h*.38}Q${w*.66} ${h*.33} ${w*.85} ${h*.28}`,aR:`M${w/2} ${h*.38}Q${w*.25} ${h*.5} ${w*.09} ${h*.6}`,lL:`M${w/2} ${h*.62}Q${w*.37} ${h*.77} ${w*.29} ${h*.96}`,lR:`M${w/2} ${h*.62}Q${w*.65} ${h*.8} ${w*.69} ${h*.96}`},
    squish:{body:`M${w/2} ${h*.29}Q${w*.46} ${h*.4} ${w*.5} ${h*.54}`,aL:`M${w/2} ${h*.35}Q${w*.2} ${h*.37} ${w*.05} ${h*.41}`,aR:`M${w/2} ${h*.35}Q${w*.8} ${h*.37} ${w*.95} ${h*.41}`,lL:`M${w*.5} ${h*.54}Q${w*.31} ${h*.63} ${w*.16} ${h*.7}`,lR:`M${w*.5} ${h*.54}Q${w*.69} ${h*.63} ${w*.84} ${h*.7}`},
    ghost:{body:`M${w/2} ${h*.29}Q${w*.44} ${h*.47} ${w*.5} ${h*.65}`,aL:`M${w/2} ${h*.38}Q${w*.27} ${h*.31} ${w*.15} ${h*.22}`,aR:`M${w/2} ${h*.38}Q${w*.73} ${h*.31} ${w*.85} ${h*.22}`,lL:`M${w*.5} ${h*.65}Q${w*.37} ${h*.81} ${w*.33} ${h*.97}`,lR:`M${w*.5} ${h*.65}Q${w*.63} ${h*.81} ${w*.67} ${h*.97}`},
  };
  return P[name]||P.idle;
}

// в”Ђв”Ђ Doll SVG в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function dollSVG(color,death,dead,poseName,px){
  const w=220,h=280,sw=14;
  px=px||110;
  const pose=getPose(poseName||'idle',w,h);
  const dark=color==="#D0C8B8"||color==="#E8E8E8";
  const ec=dark?"#2A1E38":"#0B0910";
  const ec2=dark?"rgba(0,0,0,.5)":"rgba(255,255,255,.55)";

  // Face
  const ey=h*.16; // eye y (head center at h*.175)
  const face=dead?`
    <line x1="${w*.41}" y1="${h*.15}" x2="${w*.47}" y2="${h*.17}" stroke="${ec}" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="${w*.47}" y1="${h*.15}" x2="${w*.41}" y2="${h*.17}" stroke="${ec}" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="${w*.53}" y1="${h*.15}" x2="${w*.59}" y2="${h*.17}" stroke="${ec}" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="${w*.59}" y1="${h*.15}" x2="${w*.53}" y2="${h*.17}" stroke="${ec}" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M ${w*.42} ${h*.21} Q ${w/2} ${h*.195} ${w*.58} ${h*.21}" stroke="${ec}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  `:`
    <path d="M ${w*.39} ${h*.135} Q ${w*.44} ${h*.127} ${w*.49} ${h*.135}" stroke="${ec}" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M ${w*.51} ${h*.135} Q ${w*.56} ${h*.127} ${w*.61} ${h*.135}" stroke="${ec}" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="${w*.44}" cy="${h*.155}" r="4.8" fill="${ec}"/>
    <circle cx="${w*.56}" cy="${h*.155}" r="4.8" fill="${ec}"/>
    <circle cx="${w*.455}" cy="${h*.149}" r="1.4" fill="${ec2}"/>
    <circle cx="${w*.575}" cy="${h*.149}" r="1.4" fill="${ec2}"/>
    <path d="M ${w*.4} ${h*.202} Q ${w/2} ${h*.228} ${w*.6} ${h*.202}" stroke="${ec}" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  `;

  // Death effects
  let fx="";
  if(death==="fuego"){
    fx+=`<defs><radialGradient id="fl${px}" cx="50%" cy="100%" r="80%"><stop offset="0%" stop-color="#FFD86B"/><stop offset="55%" stop-color="#E8602C"/><stop offset="100%" stop-color="#7A1F2B"/></radialGradient></defs>`;
    [[.27,.9,19,44],[.5,.85,16,48],[.73,.9,19,44]].forEach(([x,y,rx,ry])=>{
      fx+=`<ellipse class="fl" cx="${w*x}" cy="${h*y}" rx="${rx}" ry="${ry}" fill="url(#fl${px})" opacity=".9" style="animation:flicker ${1+Math.random()*.4}s ease-in-out infinite"/>`;
    });
  }
  if(death==="agujas"){
    [[.32,.23,.29,.11],[.6,.31,.67,.17],[.42,.48,.49,.33],[.72,.58,.79,.43],[.27,.68,.34,.53],[.55,.8,.62,.65]].forEach(([x1,y1,x2,y2])=>{
      fx+=`<line x1="${w*x1}" y1="${h*y1}" x2="${w*x2}" y2="${h*y2}" stroke="#D8D0C0" stroke-width="2.2"/>
      <circle cx="${w*x2}" cy="${h*y2}" r="2.5" fill="#B8A898"/>`;
    });
  }
  if(death==="ahogo"){
    fx+=`<defs><linearGradient id="wt${px}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3A6FA8" stop-opacity=".45"/><stop offset="100%" stop-color="#1A3F6A" stop-opacity=".72"/></linearGradient></defs>
    <rect x="0" y="${h*.43}" width="${w}" height="${h*.57}" fill="url(#wt${px})"/>
    <path d="M-5 ${h*.43} Q ${w*.25} ${h*.4} ${w*.5} ${h*.43} Q ${w*.75} ${h*.46} ${w+5} ${h*.43}" stroke="#7AAFD8" stroke-width="2.5" fill="none" opacity=".6"/>`;
  }
  if(death==="rayo"){
    fx+=`<defs><filter id="gl${px}"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <polyline filter="url(#gl${px})" points="${w*.52},${h*.02} ${w*.38},${h*.31} ${w*.58},${h*.33} ${w*.4},${h*.66}" stroke="#F0E060" stroke-width="9" fill="none" stroke-linejoin="round" opacity=".95" style="animation:shockPulse 1.6s ease-in-out infinite"/>
    <polyline points="${w*.52},${h*.02} ${w*.38},${h*.31} ${w*.58},${h*.33} ${w*.4},${h*.66}" stroke="white" stroke-width="2.5" fill="none" stroke-linejoin="round" opacity=".5"/>`;
  }
  if(death==="aplastado"){
    fx+=`<defs><linearGradient id="rk${px}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8A8A8A"/><stop offset="100%" stop-color="#3A3838"/></linearGradient></defs>
    <ellipse cx="${w/2}" cy="${h*.095}" rx="84" ry="44" fill="url(#rk${px})"/>
    <ellipse cx="${w/2}" cy="${h*.095}" rx="84" ry="44" fill="none" stroke="#555" stroke-width="1.5"/>
    <path d="M${w*.38} ${h*.14} Q${w*.45} ${h*.16} ${w*.52} ${h*.13}" stroke="#555" stroke-width="1" opacity=".4"/>`;
  }
  if(death==="fantasma"){
    fx+=`<g style="animation:floatSlow 3s ease-in-out infinite">
      <ellipse cx="${w*.62}" cy="${h*.14}" rx="28" ry="20" fill="white" opacity=".08"/>
      <text x="${w*.53}" y="${h*.08}" font-size="46" opacity=".8">рџ‘»</text>
    </g>`;
  }

  const anim=poseName==='ghost'?'style="animation:floatSlow 3.5s ease-in-out infinite"':'';
  const ht=Math.round(px*280/220);
  return `<div class="doll-wrap" style="width:${px}px;height:${ht}px;">
  <svg viewBox="0 0 ${w} ${h}" width="${px}" height="${ht}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block;" ${anim}>
    ${fx}
    <g stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="${w/2}" cy="${h*.175}" r="${w*.155}" fill="${color}" stroke="none"/>
      <path d="${pose.body}"/>
      <path d="${pose.aL}"/>
      <path d="${pose.aR}"/>
      <path d="${pose.lL}"/>
      <path d="${pose.lR}"/>
    </g>
    ${face}
  </svg></div>`;
}

function dollWithDraw(color,death,strokes,dead,poseName,px){
  if(death!=="dibujo")return dollSVG(color,death,dead,poseName,px);
  px=px||110;
  const ht=Math.round(px*280/220);
  const polys=(strokes||[]).map(s=>`<polyline points="${s.puntos.map(p=>`${p.x},${p.y}`).join(" ")}" stroke="${s.color}" stroke-width="${s.grosor}" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`).join("");
  return `<div class="doll-wrap" style="width:${px}px;height:${ht}px;position:relative;">
    ${dollSVG(color,null,dead,'idle',px)}
    <svg viewBox="0 0 220 280" width="${px}" height="${ht}" style="position:absolute;top:0;left:0;">${polys}</svg>
  </div>`;
}

// в”Ђв”Ђ Data в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function loadProfile(){
  const {data}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
  profile=data;
}
async function loadTodayPost(){
  const {data}=await sb.from('posts').select('*').eq('user_id',user.id).eq('post_date',todayS()).order('created_at',{ascending:false});
  const all=data||[];
  todayPost=all.find(p=>p.is_primary)||all[0]||null;
  todayPrevPost=todayPost?.previous_post_id ? all.find(p=>p.id===todayPost.previous_post_id)||null : null;
}
async function loadFeed(){
  const [{data:posts},{data:deps},{data:follows}]=await Promise.all([
    sb.from('posts').select('*').eq('post_date',todayS()).eq('is_primary',true).order('created_at',{ascending:false}),
    sb.from('deps').select('post_id').eq('user_id',user.id),
    sb.from('follows').select('following_id').eq('follower_id',user.id),
  ]);
  myDeps=new Set((deps||[]).map(d=>d.post_id));
  myFollowing=new Set((follows||[]).map(f=>f.following_id));
  const primary=posts||[];
  // fetch previous posts for cards that have one
  const prevIds=primary.map(p=>p.previous_post_id).filter(Boolean);
  let prevMap={};
  if(prevIds.length){
    const {data:prevPosts}=await sb.from('posts').select('*').in('id',prevIds);
    (prevPosts||[]).forEach(p=>{prevMap[p.id]=p;});
  }
  feedData=primary.map(p=>({...p,_prev:p.previous_post_id?prevMap[p.previous_post_id]||null:null}))
    .sort((a,b)=>{
      const af=myFollowing.has(a.user_id)?0:1,bf=myFollowing.has(b.user_id)?0:1;
      return af-bf||(new Date(b.created_at)-new Date(a.created_at));
    });
}
async function submitPost(pd){
  const t=todayS(),y=yesterS();
  const ns=(profile.last_post_date===y||(profile.last_post_date===t))?(profile.streak||1):1;
  const prevId=todayPost?.id||null;
  if(prevId) await sb.from('posts').update({is_primary:false}).eq('id',prevId);
  const {data,error}=await sb.from('posts').insert({
    user_id:user.id,username:profile.username,razon:pd.razon,castigo:pd.castigo,
    dibujo_trazos:pd.dibujo?.trazos||null,dibujo_descripcion:pd.dibujo?.descripcion||null,
    doll_color:profile.doll_color,post_date:t,is_primary:true,
    previous_post_id:prevId,
  }).select().single();
  if(error){alert('Error: '+error.message);return;}
  if(!profile.last_post_date||profile.last_post_date!==t){
    const newStreak=(profile.last_post_date===y)?(profile.streak||0)+1:1;
    await sb.from('profiles').update({streak:newStreak,last_post_date:t}).eq('id',user.id);
    profile.streak=newStreak;profile.last_post_date=t;
  }
  todayPrevPost=todayPost;todayPost=data;view='posted';paint();
}
async function toggleDep(pid){
  if(myDeps.has(pid)){
    await sb.from('deps').delete().eq('post_id',pid).eq('user_id',user.id);
    myDeps.delete(pid);
    const p=feedData.find(x=>x.id===pid);if(p)p.dep_count=Math.max(0,(p.dep_count||0)-1);
  }else{
    await sb.from('deps').insert({post_id:pid,user_id:user.id});
    myDeps.add(pid);
    const p=feedData.find(x=>x.id===pid);if(p)p.dep_count=(p.dep_count||0)+1;
  }
  paint();
}
async function toggleFollow(uid){
  if(myFollowing.has(uid)){
    await sb.from('follows').delete().eq('follower_id',user.id).eq('following_id',uid);
    myFollowing.delete(uid);
  }else{
    await sb.from('follows').insert({follower_id:user.id,following_id:uid});
    myFollowing.add(uid);
  }
  feedData.sort((a,b)=>{
    const af=myFollowing.has(a.user_id)?0:1,bf=myFollowing.has(b.user_id)?0:1;
    return af-bf||(new Date(b.created_at)-new Date(a.created_at));
  });
  paint();
}

// в”Ђв”Ђ Auth в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function doSignUp(email,pass,uname,color){
  const {data:ex}=await sb.from('profiles').select('id').eq('username',uname).maybeSingle();
  if(ex)return'Ese nombre ya estГЎ en uso';
  const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username:uname}}});
  if(error)return error.message;
  if(data.user){
    await new Promise(r=>setTimeout(r,600));
    await sb.from('profiles').upsert({id:data.user.id,username:uname,doll_color:color});
  }
  return null;
}
async function doSignIn(email,pass){
  const {error}=await sb.auth.signInWithPassword({email,password:pass});

}

function setupCanvas(){
  const cv=ge('drawCanvas');if(!cv)return;
  const ctx=cv.getContext('2d');
  let drawing=false,curC=LINE_COLORS[0],curW=LINE_WIDTHS[1],cur=null;
  window.__strokes=[];
  function guide(){
    ctx.clearRect(0,0,220,280);
    ctx.save();ctx.globalAlpha=.3;ctx.strokeStyle=profile.doll_color;ctx.fillStyle=profile.doll_color;
    ctx.lineWidth=12;ctx.lineCap='round';ctx.lineJoin='round';
    const w=220,h=280,p=getPose('idle',w,h);
    ctx.beginPath();ctx.arc(w/2,h*.175,w*.155,0,Math.PI*2);ctx.fill();
    ctx.beginPath();
    [p.body,p.aL,p.aR,p.lL,p.lR].forEach(path=>{
      const m=path.match(/M([0-9.]+) ([0-9.]+)/),q=path.match(/Q([0-9.]+) ([0-9.]+) ([0-9.]+) ([0-9.]+)/);
      if(m&&q){ctx.moveTo(+m[1],+m[2]);ctx.quadraticCurveTo(+q[1],+q[2],+q[3],+q[4]);}
    });
    ctx.stroke();ctx.restore();
  }
  function redraw(){guide();window.__strokes.forEach(s=>{ctx.strokeStyle=s.color;ctx.lineWidth=s.grosor;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();s.puntos.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();});}
  function pos(e){const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)};}
  cv.addEventListener('mousedown',e=>{e.preventDefault();drawing=true;cur={puntos:[pos(e)],color:curC,grosor:curW};});
  cv.addEventListener('mousemove',e=>{if(!drawing)return;e.preventDefault();const p=pos(e);cur.puntos.push(p);const pts=cur.puntos;ctx.strokeStyle=curC;ctx.lineWidth=curW;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(pts[pts.length-2].x,pts[pts.length-2].y);ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);ctx.stroke();});
  const end=()=>{if(drawing&&cur){window.__strokes.push(cur);cur=null;checkDraw();}drawing=false;};
  cv.addEventListener('mouseup',end);cv.addEventListener('mouseleave',end);
  cv.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;cur={puntos:[pos(e)],color:curC,grosor:curW};},{passive:false});
  cv.addEventListener('touchmove',e=>{if(!drawing)return;e.preventDefault();const p=pos(e);cur.puntos.push(p);const pts=cur.puntos;ctx.strokeStyle=curC;ctx.lineWidth=curW;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(pts[pts.length-2].x,pts[pts.length-2].y);ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);ctx.stroke();},{passive:false});
  cv.addEventListener('touchend',end);
  document.querySelectorAll('.swatch').forEach(s=>{s.onclick=()=>{curC=s.getAttribute('data-color');document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on'));s.classList.add('on');};});
  document.querySelectorAll('.wbtn').forEach(b=>{b.onclick=()=>{curW=parseInt(b.getAttribute('data-width'));document.querySelectorAll('.wbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');};});
  ge('clearCanvas').onclick=()=>{window.__strokes=[];redraw();checkDraw();};
  ge('guardarDibujo').onclick=async()=>{
    const r=ge('razonDibujo').value.trim(),d=ge('descDibujo').value.trim();
    const btn=ge('guardarDibujo');btn.disabled=true;btn.textContent='...';
    await submitPost({razon:r,castigo:'dibujo',dibujo:{trazos:window.__strokes,descripcion:d}});
  };
  guide();
}

// в”Ђв”Ђ Init в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function init(){
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user){
      user=session.user;await loadProfile();
      if(!profile){const u=user.user_metadata?.username||user.email.split('@')[0];await sb.from('profiles').upsert({id:user.id,username:u,doll_color:pendingSignup.color||DOLL_COLORS[0]});await loadProfile();}
      await loadTodayPost();view='home';paint();
    }else if(event==='SIGNED_OUT'){user=null;profile=null;todayPost=null;authStep='form';view='auth';paint();}
  });
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user){
    user=session.user;await loadProfile();
    if(!profile){const u=user.user_metadata?.username||user.email.split('@')[0];await sb.from('profiles').upsert({id:user.id,username:u,doll_color:DOLL_COLORS[0]});await loadProfile();}
    await loadTodayPost();view='home';
  }else{view='auth';}
  paint();
}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
init();
</script>
